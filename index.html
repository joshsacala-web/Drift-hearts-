<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🌊 BEACH (MOVES NOW) */
.bg {
    position: fixed;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
    transition: transform 4s ease;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* APP */
#app {
    position: absolute;
    top: 28%;
    width: 100%;
    text-align: center;
}

/* ❤️ HEART */
.heart {
    font-size: 120px;
    transition: transform 0.2s ease;
    filter: drop-shadow(0 0 30px rgba(255,60,60,0.9));
}

/* TEXT */
#label { font-size: 30px; }
#feedback { opacity: 0.85; margin-top: 5px; }
#timer { opacity: 0.6; }

/* START */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button {
    margin-top:15px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#ef4444;
    color:white;
    font-size:16px;
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button onclick="start()">Start</button>
</div>

<div id="app">
    <div class="heart" id="heart">❤️</div>
    <div id="label">READY</div>
    <div id="feedback"></div>
    <div id="timer">60</div>
</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");
let feedback = document.getElementById("feedback");
let timerEl = document.getElementById("timer");
let bg = document.getElementById("bg");

let running = false;
let startTime;
let total = 60;

/* 🎧 BETTER VOICE */
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);

    // less robotic
    msg.rate = 0.75;
    msg.pitch = 0.8;

    // try to pick better voice if available
    let voices = speechSynthesis.getVoices();
    let calmVoice = voices.find(v => v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("google"));
    if (calmVoice) msg.voice = calmVoice;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
    startTime = performance.now();
    loop();
}

function loop() {
    if (!running) return;

    let now = performance.now();
    let elapsed = (now - startTime) / 1000;
    let remaining = Math.max(0, total - elapsed);

    timerEl.innerText = Math.ceil(remaining);

    if (remaining <= 0) {
        endSession();
        return;
    }

    let cycle = elapsed % 10;

    if (cycle < 4) {
        // INHALE
        label.innerText = "Inhale";

        let scale = 1 + cycle * 0.12;
        heart.style.transform = `scale(${scale})`;

        // 🌊 MOVE OCEAN UP (THIS IS THE REAL FIX)
        bg.style.transform = "scale(1.1) translateY(-20px)";

        if (Math.floor(cycle) === 0) {
            speak("Inhale...");
        }

        feedback.innerText = "Slow breath in";

    } else {
        // EXHALE
        let t = (cycle - 4) / 6;

        label.innerText = "Exhale";

        let scale = 1.5 - t * 0.5;
        heart.style.transform = `scale(${scale})`;

        // 🌊 MOVE OCEAN DOWN
        bg.style.transform = "scale(1) translateY(20px)";

        if (Math.floor(cycle) === 4) {
            speak("Exhale...");
        }

        feedback.innerText = "Let it go";
    }

    requestAnimationFrame(loop);
}

function endSession() {
    running = false;

    let msg = "You're back in control";

    label.innerText = msg;
    feedback.innerText = "";
    timerEl.innerText = "";

    speak(msg);

    // 🔁 ALWAYS SHOW RETRY (FIXED)
    let btn = document.createElement("button");
    btn.innerText = "Retry";
    btn.style.position = "absolute";
    btn.style.bottom = "20%";
    btn.style.left = "50%";
    btn.style.transform = "translateX(-50%)";

    btn.onclick = () => location.reload();

    document.body.appendChild(btn);
}

</script>

</body>
</html>
