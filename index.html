<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; background:#020617; overflow:hidden; font-family:sans-serif; color:white; }
#ui {
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 font-size:20px;
}
#centerMsg{
 position:fixed;
 top:50%;
 width:100%;
 text-align:center;
 font-size:26px;
 transform:translateY(-50%);
}
canvas { display:block; }
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<div id="centerMsg">Drag & Release 💘</div>
<canvas id="c"></canvas>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let cx = canvas.width/2;
let cy = canvas.height/2;

let boardRadius = Math.min(innerWidth, innerHeight)/3;

let score = 0;

let dart = null;
let aiming = false;
let startX, startY;

// input
canvas.addEventListener("mousedown", startAim);
canvas.addEventListener("touchstart", startAim);

canvas.addEventListener("mouseup", shoot);
canvas.addEventListener("touchend", shoot);

function startAim(e){
 aiming = true;
 let p = getPos(e);
 startX = p.x;
 startY = p.y;
}

function shoot(e){
 if(!aiming) return;
 aiming = false;

 let p = getPos(e);

 let dx = startX - p.x;
 let dy = startY - p.y;

 dart = {
   x: startX,
   y: startY,
   vx: dx * 0.15,
   vy: dy * 0.15,
   active: true
 };
}

function getPos(e){
 if(e.touches){
   return {x:e.touches[0].clientX, y:e.touches[0].clientY};
 } else {
   return {x:e.clientX, y:e.clientY};
 }
}

// draw dartboard
function drawBoard(){
 ctx.beginPath();
 ctx.arc(cx, cy, boardRadius, 0, Math.PI*2);
 ctx.fillStyle = "#111827";
 ctx.fill();

 // rings
 drawRing(0.9, "#1f2937"); // outer
 drawRing(0.7, "#111827");
 drawRing(0.5, "#1f2937");

 // double ring
 drawRing(0.95, "#ef4444");

 // triple ring
 drawRing(0.55, "#22c55e");

 // bull
 ctx.beginPath();
 ctx.arc(cx, cy, boardRadius*0.1, 0, Math.PI*2);
 ctx.fillStyle = "#ef4444";
 ctx.fill();

 ctx.beginPath();
 ctx.arc(cx, cy, boardRadius*0.05, 0, Math.PI*2);
 ctx.fillStyle = "#facc15";
 ctx.fill();
}

function drawRing(r, color){
 ctx.beginPath();
 ctx.arc(cx, cy, boardRadius*r, 0, Math.PI*2);
 ctx.strokeStyle = color;
 ctx.lineWidth = 10;
 ctx.stroke();
}

// scoring
function getScore(x,y){
 let dx = x - cx;
 let dy = y - cy;
 let dist = Math.sqrt(dx*dx + dy*dy);

 if(dist > boardRadius) return 0;

 let angle = Math.atan2(dy, dx);
 let deg = (angle * 180/Math.PI + 360) % 360;

 let sector = Math.floor(deg / 18); // 20 slices

 let base = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5][sector];

 if(dist < boardRadius*0.05) return 50;
 if(dist < boardRadius*0.1) return 25;

 if(dist > boardRadius*0.9) return base*2;
 if(dist > boardRadius*0.5 && dist < boardRadius*0.6) return base*3;

 return base;
}

// loop
setInterval(()=>{

 ctx.clearRect(0,0,canvas.width,canvas.height);

 drawBoard();

 // dart
 if(dart && dart.active){
   dart.x += dart.vx;
   dart.y += dart.vy;

   ctx.font = "24px sans-serif";
   ctx.fillText("💘", dart.x, dart.y);

   let dx = dart.x - cx;
   let dy = dart.y - cy;
   let dist = Math.sqrt(dx*dx + dy*dy);

   if(dist < boardRadius){
     let pts = getScore(dart.x, dart.y);
     score += pts;

     document.getElementById("ui").innerText = "Score: " + score + " (+"+pts+")";

     dart.active = false;
   }

   // stop if off screen
   if(dart.x<0||dart.x>innerWidth||dart.y<0||dart.y>innerHeight){
     dart.active = false;
   }
 }

},30);
</script>

</body>
</html>
