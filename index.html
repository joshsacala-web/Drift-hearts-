<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saxson 2</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

h2{
  color:gold;
  text-shadow:0 0 10px gold;
}

#game{
  max-width:420px;
  margin:auto;
}

#reels{
  display:flex;
  gap:6px;
  padding:10px;
}

.reel{
  flex:1;
  height:240px;
  overflow:hidden;
  border-radius:10px;
  border:2px solid gold;
  background:linear-gradient(#222,#000);
  box-shadow:0 0 10px gold;
}

.symbol{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  border-bottom:1px solid #111;
}

#panel{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button{
  padding:10px;
  background:gold;
  border:none;
  border-radius:6px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="game">
<h2>SAXSON 2</h2>

<div id="reels"></div>

<div id="panel">
<div id="balance">$100.00</div>
<div id="info">x1</div>
<button onclick="spin()">SPIN</button>
</div>
</div>

<script>
let balance = 100;
let bet = 0.5;
let reels = [];
let symbols = ["💀","🎸","🔥","🛞","⚡","W"];
let inBonus = false;
let multiplier = 1;
let sticky = [];

function build(){
  let r = document.getElementById("reels");
  r.innerHTML="";
  reels=[];

  for(let i=0;i<5;i++){
    let reel = document.createElement("div");
    reel.className="reel";

    let arr=[];
    for(let j=0;j<3;j++){
      let s = document.createElement("div");
      s.className="symbol";
      s.innerText = symbols[Math.floor(Math.random()*symbols.length)];
      reel.appendChild(s);
      arr.push(s);
    }

    r.appendChild(reel);
    reels.push(arr);
  }
}

function spin(){
  if(balance < bet) return;

  balance -= bet;
  document.getElementById("balance").innerText="$"+balance.toFixed(2);

  for(let i=0;i<5;i++){
    for(let j=0;j<3;j++){
      let rand = symbols[Math.floor(Math.random()*symbols.length)];

      if(inBonus && sticky[i+"-"+j]){
        rand = "W";
      }

      reels[i][j].innerText = rand;
    }
  }

  checkWin();
}

function checkWin(){
  let center = reels.map(r=>r[1].innerText);

  let first = center[0];
  let count = 1;

  for(let i=1;i<center.length;i++){
    if(center[i]===first || center[i]==="W"){
      count++;
    } else break;
  }

  if(count>=3){
    let win = count * bet * multiplier * 2;
    balance += win;

    document.getElementById("balance").innerText="$"+balance.toFixed(2);

    if(inBonus){
      multiplier++;
    }

    flash();
  }

  checkBonus();
}

function checkBonus(){
  let r2 = reels[1][1].innerText;
  let r4 = reels[3][1].innerText;

  if(r2==="🔥" && r4==="🛞"){
    startBonus();
  }
}

function startBonus(){
  inBonus = true;
  multiplier = 1;
  sticky = {};

  let spins = Math.floor(Math.random()*10)+5;

  alert("BONUS "+spins+" spins");

  let interval = setInterval(()=>{
    if(spins<=0){
      inBonus=false;
      clearInterval(interval);
      return;
    }

    for(let i=0;i<5;i++){
      for(let j=0;j<3;j++){
        let rand = symbols[Math.floor(Math.random()*symbols.length)];

        if(rand==="W"){
          sticky[i+"-"+j]=true;
        }

        if(sticky[i+"-"+j]){
          rand="W";
        }

        reels[i][j].innerText = rand;
      }
    }

    checkWin();
    spins--;

  },800);
}

function flash(){
  document.querySelectorAll(".reel").forEach(r=>{
    r.style.boxShadow="0 0 25px gold";
    setTimeout(()=>r.style.boxShadow="0 0 10px gold",300);
  });
}

build();
</script>

</body>
</html>
