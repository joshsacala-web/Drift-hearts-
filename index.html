<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
}

body {
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* 🌊 REAL BEACH BACKGROUND */
.bg {
    position: fixed;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center center/cover;
    filter: brightness(0.7);
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* ECG LINE */
.ecg {
    position: absolute;
    bottom: 40%;
    width: 200%;
    height: 100px;
    border-top: 2px solid rgba(255,255,255,0.7);
    animation: ecgMove 6s linear infinite;
    opacity: 0.5;
}

@keyframes ecgMove {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
}

/* APP */
#app {
    position: absolute;
    top: 28%;
    width: 100%;
    text-align: center;
    z-index: 2;
}

/* ❤️ HEART */
.heart {
    width: 160px;
    height: 160px;
    margin: auto;
    position: relative;
}

.fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ff4d4d, #ff9999);
    border-radius: 50% 50% 0 0;
}

svg {
    position: absolute;
    inset: 0;
}

/* TEXT */
#label {
    margin-top: 20px;
    font-size: 26px;
}

#feedback {
    margin-top: 6px;
    font-size: 16px;
    opacity: 0.8;
}

#timer {
    margin-top: 6px;
    opacity: 0.6;
}

/* BUTTONS */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #ef4444;
    color: white;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="ecg"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <p>Follow the rhythm</p>
    <button onclick="start()">Start</button>
</div>

<div id="app">
    <div class="heart">
        <div class="fill" id="fill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3C9.5 3 12 5 12 5s2.5-2 4.5-2C21 3 21 8 21 12.5S12 21 12 21z"/>
        </svg>
    </div>

    <div id="label">READY</div>
    <div id="feedback"></div>
    <div id="timer">60</div>
</div>

<script>

let fill = document.getElementById("fill");
let label = document.getElementById("label");
let feedback = document.getElementById("feedback");
let timerEl = document.getElementById("timer");

let running = false;
let startTime = 0;
let total = 60;

/* 🔊 CALM SOUND */
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
let gain = ctx.createGain();

osc.frequency.value = 100;
gain.gain.value = 0;

osc.connect(gain);
gain.connect(ctx.destination);
osc.start();

/* 📳 VIBRATION */
function vibrate(p) {
    if (navigator.vibrate) navigator.vibrate(p);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
    startTime = performance.now();

    gain.gain.linearRampToValueAtTime(0.02, ctx.currentTime + 2);

    loop();
}

function loop() {
    if (!running) return;

    let now = performance.now();
    let elapsed = (now - startTime) / 1000;
    let remaining = Math.max(0, total - elapsed);

    timerEl.innerText = Math.ceil(remaining);

    if (remaining <= 0) {
        endSession();
        return;
    }

    let cycle = elapsed % 10;

    /* 🫁 BREATHING */
    if (cycle < 4) {
        label.innerText = "Inhale";
        fill.style.height = (cycle / 4) * 100 + "%";
        feedback.innerText = "You’re taking control";
        vibrate(10);
    } else {
        label.innerText = "Exhale";
        let t = (cycle - 4) / 6;
        fill.style.height = (1 - t) * 100 + "%";
        feedback.innerText = "Slowing down…";
        vibrate([5,20,5]);
    }

    /* 🧠 PROGRESSION FEEDBACK */
    if (elapsed > 20 && elapsed < 40) {
        feedback.innerText = "Stabilizing…";
    }
    if (elapsed > 40) {
        feedback.innerText = "You’re steady now";
    }

    requestAnimationFrame(loop);
}

function endSession() {
    running = false;

    label.innerText = "Calm restored";
    feedback.innerText = "";

    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);

    let btn = document.createElement("button");
    btn.innerText = "Try again";
    btn.onclick = () => location.reload();

    document.getElementById("app").appendChild(btn);
}

</script>

</body>
</html>
