<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drift Hearts</title>

<style>
body{margin:0;overflow:hidden;background:#000;}
canvas{display:block;}
#start{
 position:fixed;inset:0;
 display:flex;align-items:center;justify-content:center;
 background:#000;color:#fff;
 font-size:22px;font-family:sans-serif;
 z-index:10;
}
</style>
</head>

<body>

<div id="start">Tap to Start</div>
<canvas id="game"></canvas>

<audio id="ocean" loop preload="auto" playsinline>
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// GAME STATE
let started=false, gameOver=false;
let score=0, speed=2, time=0;

// PLAYER
let player={
 x:150,
 y:canvas.height/2,
 vx:0, vy:0,
 angle:0
};

// JOYSTICK
let joy={
 baseX:canvas.width/2,
 baseY:canvas.height*0.85,
 x:0,y:0,active:false
};

// ENTITIES
let birds=[], hearts=[], particles=[];

// AUDIO
function startGame(){
 if(started) return;

 const audio=document.getElementById("ocean");

 audio.play().then(()=>{
   audio.volume=0.5;
   started=true;
   document.getElementById("start").style.display="none";
 }).catch(()=>{
   document.getElementById("start").innerText="Tap again for sound";
 });
}

// INPUT
document.addEventListener("touchstart",e=>{
 startGame();
 joy.active=true;
},{passive:false});

document.addEventListener("touchmove",e=>{
 if(!joy.active) return;
 let t=e.touches[0];

 joy.x = t.clientX - joy.baseX;
 joy.y = t.clientY - joy.baseY;

 let max=40;
 joy.x=Math.max(-max,Math.min(max,joy.x));
 joy.y=Math.max(-max,Math.min(max,joy.y));

 player.vx = joy.x * 0.05;
 player.vy = joy.y * 0.05;
},{passive:false});

document.addEventListener("touchend",()=>{
 joy.active=false;
 joy.x=0; joy.y=0;
});

// DRAW BEACH
function drawScene(){

 time += 0.01;

 // SKY
 let sky = ctx.createLinearGradient(0,0,0,canvas.height);
 sky.addColorStop(0,"#4fc3f7");
 sky.addColorStop(1,"#ffe0b2");
 ctx.fillStyle=sky;
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // SUN
 ctx.beginPath();
 ctx.arc(canvas.width*0.75, canvas.height*0.25, 60, 0, Math.PI*2);
 ctx.fillStyle="rgba(255,255,200,0.9)";
 ctx.fill();

 // OCEAN
 ctx.fillStyle="#2ec4f0";
 ctx.fillRect(0,canvas.height*0.55,canvas.width,canvas.height*0.25);

 // WAVES
 ctx.strokeStyle="rgba(255,255,255,0.6)";
 for(let l=0;l<3;l++){
   ctx.beginPath();
   for(let x=0;x<canvas.width;x+=10){
     let y = canvas.height*0.55 +
       Math.sin(x*0.02 + time*(2+l))*(5+l*3);
     ctx.lineTo(x,y);
   }
   ctx.stroke();
 }

 // SAND
 ctx.fillStyle="#f4d9a5";
 ctx.fillRect(0,canvas.height*0.8,canvas.width,canvas.height);
}

// GAME LOOP
function loop(){

 drawScene();

 if(started && !gameOver){

   // movement
   player.x += player.vx;
   player.y += player.vy;

   player.x=Math.max(0,Math.min(canvas.width,player.x));
   player.y=Math.max(0,Math.min(canvas.height,player.y));

   player.angle = player.vy * 0.1;

   // spawn birds
   if(Math.random()<0.02){
     birds.push({
       x:canvas.width,
       y:Math.random()*canvas.height*0.6,
       vy:(Math.random()-0.5)*1.5
     });
   }

   // spawn hearts
   if(Math.random()<0.015){
     hearts.push({
       x:canvas.width,
       y:Math.random()*canvas.height*0.6
     });
   }

   // birds
   birds.forEach(b=>{
     b.x -= speed;
     b.y += b.vy;

     ctx.fillStyle="#111";
     ctx.fillRect(b.x,b.y,22,10);
     ctx.fillRect(b.x+6,b.y-5,10,5);

     if(Math.abs(player.x-b.x)<25 && Math.abs(player.y-b.y)<25){
       gameOver=true;
     }
   });

   // hearts
   hearts.forEach(h=>{
     h.x -= speed;

     ctx.fillStyle="red";
     ctx.beginPath();
     ctx.arc(h.x,h.y,6,0,Math.PI*2);
     ctx.fill();

     if(Math.abs(player.x-h.x)<20 && Math.abs(player.y-h.y)<20){
       score += 10;
       h.hit=true;

       for(let i=0;i<6;i++){
         particles.push({
           x:h.x,y:h.y,
           vx:Math.random()*4-2,
           vy:Math.random()*4-2,
           life:25
         });
       }
     }
   });

   // particles
   particles.forEach(p=>{
     p.x+=p.vx;
     p.y+=p.vy;
     p.life--;
     ctx.fillStyle="pink";
     ctx.fillRect(p.x,p.y,2,2);
   });

   birds = birds.filter(b=>b.x>-50);
   hearts = hearts.filter(h=>!h.hit && h.x>-50);
   particles = particles.filter(p=>p.life>0);

   speed += 0.0003;
   score++;
 }

 // player
 ctx.save();
 ctx.translate(player.x,player.y);
 ctx.rotate(player.angle);
 ctx.font="36px sans-serif";
 ctx.fillText("❤️",-18,10);
 ctx.restore();

 // joystick
 ctx.beginPath();
 ctx.arc(joy.baseX,joy.baseY,40,0,Math.PI*2);
 ctx.strokeStyle="white";
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(joy.baseX+joy.x,joy.baseY+joy.y,20,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.fill();

 // UI
 ctx.fillStyle="white";
 ctx.font="18px sans-serif";
 ctx.fillText("Score: "+score,20,30);

 if(gameOver){
   ctx.font="28px sans-serif";
   ctx.fillText("Game Over",20,70);
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
