<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; touch-action:none; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let t = 0;
let score = 0;

// player (SIDE MOVEMENT ONLY)
let x = c.width/2;
let speed = 0;
let targetX = x;

// ground levels
let shoreY = c.height * 0.65;

// shells
let shells = [];

// INPUT (tight)
c.addEventListener("touchmove", e=>{
 targetX = e.touches[0].clientX;
});
c.addEventListener("mousemove", e=>{
 targetX = e.clientX;
});

// spawn shells near shoreline
function spawn(){
 shells.push({
   x: Math.random()*c.width,
   y: shoreY + 20 + Math.random()*30,
   hit:false
 });
}

function loop(){
 t += 0.04;

 // SKY
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#7ec8ff");
 sky.addColorStop(1,"#ffd2a6");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // SUN
 ctx.beginPath();
 ctx.arc(c.width*0.8, 120 + Math.sin(t)*5, 40, 0, Math.PI*2);
 ctx.fillStyle = "rgba(255,220,120,0.9)";
 ctx.fill();

 // OCEAN
 let ocean = ctx.createLinearGradient(0,shoreY-100,0,c.height);
 ocean.addColorStop(0,"#3aa6d6");
 ocean.addColorStop(1,"#0e3a5a");
 ctx.fillStyle = ocean;
 ctx.fillRect(0,shoreY-100,c.width,100);

 // WAVES (rolling)
 ctx.beginPath();
 for(let px=0; px<c.width; px++){
   let y = shoreY - 20 + Math.sin(px*0.02 + t)*10;
   ctx.lineTo(px,y);
 }
 ctx.strokeStyle = "white";
 ctx.lineWidth = 2;
 ctx.stroke();

 // SAND
 ctx.fillStyle = "#f4d9a0";
 ctx.fillRect(0,shoreY,c.width,c.height);

 // movement (tight)
 speed = (targetX - x) * 0.15;
 x += speed;

 // spawn shells
 if(Math.random()<0.04) spawn();

 // shells
 shells.forEach(s=>{
   ctx.fillStyle="#d19c5c";
   ctx.beginPath();
   ctx.arc(s.x, s.y, 6, 0, Math.PI*2);
   ctx.fill();

   // collect
   if(Math.abs(s.x - x) < 20){
     score++;
     s.hit = true;
   }
 });

 shells = shells.filter(s=>!s.hit);

 // player (simple character)
 ctx.fillStyle="red";
 ctx.beginPath();
 ctx.arc(x, shoreY-10, 10, 0, Math.PI*2);
 ctx.fill();

 // UI
 document.getElementById("ui").innerText = "Score: " + score;

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
