<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>AFib Drift Pro</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  background: linear-gradient(to top, #041018 0%, #063042 40%, #0aa3c7 70%, #7be7ff 100%);
}canvas { position: absolute; top: 0; left: 0; }

#ui { z-index: 2; text-align: center; width: 100%; max-width: 420px; }

#heartWrap { width: 160px; height: 160px; margin: 20px auto; position: relative; }

#heart { width: 100%; height: 100%; position: relative; transform: scale(1); transition: transform 0.15s; }

#heart::before, #heart::after { content: ""; position: absolute; top: 0; width: 80px; height: 120px; border-radius: 80px 80px 0 0; background: #ff3d6e; filter: drop-shadow(0 0 10px rgba(255,61,110,0.4)); }

#heart::before { left: 80px; transform: rotate(-45deg); transform-origin: 0 100%; }

#heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

#fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: rgba(255,255,255,0.18); transition: height 1s ease; }

button { padding: 12px 20px; border: none; border-radius: 12px; background: #00e0ff; font-weight: bold; cursor: pointer; margin-top: 10px; }

#text { margin-top: 12px; font-size: 15px; opacity: 0.9; }

#mode { font-size: 12px; opacity: 0.6; margin-top: 6px; } </style>

</head>
<body><canvas id="waves"></canvas>

<div id="ui">
  <div id="heartWrap">
    <div id="heart">
      <div id="fill"></div>
    </div>
  </div><button onclick="start()">Start Drift Pro Session</button>

  <div id="text">Tap to begin breathing flow</div>
  <div id="mode">adaptive drift breathing</div>
</div><script>
const canvas = document.getElementById("waves");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let running = false;
let startTime;
let lastCycle = -1;
let fill = 0;
let stability = 0; // adaptive calming factor

function drawWaves(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const baseY = canvas.height * 0.75;

  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(0, baseY);

    for (let x = 0; x < canvas.width; x++) {
      const y = baseY + Math.sin((x * 0.01) + t * (0.6 + i * 0.2)) * (20 + stability * 10);
      ctx.lineTo(x, y);
    }

    ctx.strokeStyle = `rgba(255,255,255,${0.15 - i * 0.04})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function start() {
  running = true;
  startTime = Date.now();
  fill = 0;
  stability = 0;
  animate();
}

function animate() {
  if (!running) return;

  const t = (Date.now() - startTime) / 1000;

  drawWaves(t);

  const breath = Math.sin(t * (0.65 + stability * 0.1));

  const heart = document.getElementById("heart");
  heart.style.transform = `scale(${1 + breath * 0.08})`;

  if (breath > 0.2) {
    document.getElementById("text").textContent = "Inhale... ocean rising";
  } else if (breath < -0.2) {
    document.getElementById("text").textContent = "Exhale... drifting down";
  } else {
    document.getElementById("text").textContent = "steady drift";
  }

  // adaptive calming (simulates settling)
  stability += 0.0008;
  stability = Math.min(stability, 1);

  // fill heart per completed cycle
  const cycle = Math.floor(t / 6);
  if (cycle !== lastCycle) {
    lastCycle = cycle;
    fill = Math.min(fill + 10 + stability * 5, 100);
    document.getElementById("fill").style.height = fill + "%";
  }

  requestAnimationFrame(animate);
}

// tap anywhere to reset session
window.addEventListener("click", () => {
  running = false;
  document.getElementById("text").textContent = "session reset — ready";
  document.getElementById("fill").style.height = "0%";
  fill = 0;
  stability = 0;
});
</script></body>
</html>
