<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
body{
 margin:0;
 overflow:hidden;
 touch-action:none;
}
canvas{display:block;}
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 6px black;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<audio id="ocean" loop src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3"></audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let playing = false;
let gameOver = false;
let score = 0;
let time = 0;
let slowMo = 1;

// player
let p = { x:120, y:c.height/2, vy:0 };

// birds
let birds = [];
let spawnTimer = 0;

// input
function flap(){
 if(!playing){
   playing = true;
   document.getElementById("ocean").volume = 0.4;
   document.getElementById("ocean").play();
   return;
 }

 if(gameOver) location.reload();

 p.vy = -6;
}
document.addEventListener("touchstart", flap, {passive:false});
document.addEventListener("mousedown", flap);

// loop
function loop(){

 time += 0.002;

 // 🌅 sky transition
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0, `hsl(${200 - time*50},80%,70%)`);
 sky.addColorStop(1, `hsl(${40 - time*20},80%,85%)`);
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // 🌊 animated waves
 ctx.strokeStyle = "rgba(255,255,255,0.6)";
 for(let i=0;i<3;i++){
   ctx.beginPath();
   for(let x=0;x<c.width;x+=10){
     let y = c.height*0.65 + Math.sin(x*0.02 + time*3 + i)*10;
     ctx.lineTo(x,y);
   }
   ctx.stroke();
 }

 // spawn birds
 if(playing && !gameOver){
   spawnTimer--;
   if(spawnTimer <= 0){
     birds.push({
       x:c.width,
       y:Math.random()*c.height*0.5+50,
       phase:Math.random()*10
     });
     spawnTimer = 100;
   }
 }

 // birds movement (🐦 swoop)
 birds.forEach(b=>{
   b.x -= 3 * slowMo;
   b.phase += 0.05;

   // swoop motion
   b.y += Math.sin(b.phase) * 1.5;

   ctx.font="30px sans-serif";
   ctx.fillText("🐦", b.x, b.y);

   // collision
   if(
     p.x < b.x+30 &&
     p.x+30 > b.x &&
     p.y < b.y+30 &&
     p.y+30 > b.y
   ){
     gameOver = true;
   }

   // ✨ near miss
   let dist = Math.abs(p.x - b.x) + Math.abs(p.y - b.y);
   if(dist < 70 && dist > 40){
     slowMo = 0.5;
     score += 2; // bonus
   }
 });

 birds = birds.filter(b=>b.x > -50);

 // physics
 if(playing && !gameOver){
   p.vy += 0.45;
   p.y += p.vy;
   score++;

   if(p.y < 0) p.y = 0;
   if(p.y > c.height) gameOver = true;
 }

 // reset slowmo gradually
 slowMo += (1 - slowMo) * 0.05;

 // player
 ctx.shadowBlur = 10;
 ctx.shadowColor = "red";
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // UI
 if(!playing){
   document.getElementById("ui").innerText = "Tap to Start";
 } else if(gameOver){
   document.getElementById("ui").innerText = "Game Over — " + score + " (tap)";
 } else {
   document.getElementById("ui").innerText = "Score: " + score;
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
