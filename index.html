<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#0b3d2e;font-family:sans-serif;color:white;text-align:center}
#table{position:relative;width:100%;height:100vh}

.card{
 width:60px;height:90px;
 background:white;color:black;
 border-radius:8px;
 display:inline-flex;
 align-items:center;
 justify-content:center;
 font-weight:bold;
 margin:4px;
}

#community{position:absolute;top:40%;width:100%}
#player{position:absolute;bottom:10%}
#ai{position:absolute;top:10%}

#controls{
 position:absolute;
 bottom:0;width:100%;
 display:flex;justify-content:center;gap:10px;
}

button{
 padding:10px 20px;
 font-size:16px;
 border:none;border-radius:6px;
}

</style>
</head>
<body>

<div id="table">

<div id="ai"></div>

<div id="community"></div>

<div id="player"></div>

<div id="controls">
<button onclick="fold()">Fold</button>
<button onclick="call()">Call</button>
<button onclick="raise()">Raise</button>
</div>

<div id="info"></div>

</div>

<script>

let deck=[],player=[],ai=[],community=[];
let pot=0,stage=0;

// CREATE DECK
function newDeck(){
 const suits=["♠","♥","♦","♣"];
 const values=["A","K","Q","J","10","9","8","7","6","5","4","3","2"];
 let d=[];
 suits.forEach(s=>{
   values.forEach(v=>{
     d.push(v+s);
   });
 });
 return d.sort(()=>Math.random()-0.5);
}

// DEAL
function deal(){
 deck=newDeck();
 player=[deck.pop(),deck.pop()];
 ai=[deck.pop(),deck.pop()];
 community=[];
 pot=0;
 stage=0;
 render();
}

// RENDER
function render(){

 document.getElementById("player").innerHTML =
 player.map(c=>`<div class="card">${c}</div>`).join("");

 document.getElementById("ai").innerHTML =
 ai.map(()=>`<div class="card">🂠</div>`).join("");

 document.getElementById("community").innerHTML =
 community.map(c=>`<div class="card">${c}</div>`).join("");

 document.getElementById("info").innerText =
 "Pot: "+pot;
}

// GAME FLOW
function next(){

 if(stage===0){
   community.push(deck.pop(),deck.pop(),deck.pop());
 }
 else if(stage===1){
   community.push(deck.pop());
 }
 else if(stage===2){
   community.push(deck.pop());
 }
 else if(stage===3){
   showdown();
   return;
 }

 stage++;
 render();
}

// ACTIONS
function call(){
 pot+=10;
 next();
}

function raise(){
 pot+=20;
 next();
}

function fold(){
 alert("You folded");
 deal();
}

// SHOWDOWN
function showdown(){

 document.getElementById("ai").innerHTML =
 ai.map(c=>`<div class="card">${c}</div>`).join("");

 let winner = Math.random()>0.5 ? "You win!" : "AI wins!";
 document.getElementById("info").innerText = winner + " Pot: "+pot;

 setTimeout(deal,2000);
}

// START
deal();

</script>

</body>
</html>
