<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart Ultra</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, Arial, sans-serif;
    color: white;
}

/* 🌅 FAKE REALISTIC BEACH (NO INTERNET NEEDED) */
.bg {
    position: fixed;
    inset: 0;
    background:
        linear-gradient(to top, #020617 0%, #0f172a 40%, #1e3a8a 70%, #f97316 100%);
}

/* 🌊 OCEAN LAYER */
.ocean {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(to top, rgba(0,100,200,0.6), transparent);
}

/* subtle wave motion */
.ocean::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 70%);
    animation: wave 10s linear infinite;
}

@keyframes wave {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* APP */
#app {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
}

/* HEART */
.heart {
    width: 180px;
    margin: auto;
    transform: scale(1);
    transition: transform 0.3s ease;
    filter: drop-shadow(0 0 40px rgba(255,80,80,0.9));
}

/* TEXT */
#label {
    margin-top: 30px;
    font-size: 34px;
    letter-spacing: 4px;
}

/* PANEL */
.panel {
    margin-top: 20px;
    background: rgba(255,255,255,0.1);
    padding: 10px 20px;
    border-radius: 12px;
    display: inline-block;
}

/* START */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    margin-top: 12px;
    padding: 12px 26px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

#startBtn { background: #ef4444; color: white; }
#soundBtn { background: #334155; color: white; }

</style>
</head>

<body>

<div class="bg"></div>
<div class="ocean"></div>
<div class="overlay"></div>

<audio id="oceanSound" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4c9d.mp3">
</audio>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button id="startBtn" onclick="start()">Start</button>
    <button id="soundBtn" onclick="toggleSound()">Sound: ON</button>
</div>

<div id="app">
    <div class="heart" id="heart">❤️</div>
    <div id="label">READY</div>
    <div class="panel">4s inhale • 6s exhale</div>
</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");
let oceanSound = document.getElementById("oceanSound");

let running = false;
let soundOn = true;

function speak(text) {
    if (!soundOn) return;
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.7;
    msg.pitch = 0.8;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function toggleSound() {
    soundOn = !soundOn;
    document.getElementById("soundBtn").innerText =
        "Sound: " + (soundOn ? "ON" : "OFF");

    if (!soundOn) oceanSound.pause();
    else oceanSound.play();
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;

    if (soundOn) {
        oceanSound.volume = 0.4;
        oceanSound.play();
    }

    intro();
}

async function intro() {
    speak("Follow the heart");
    await sleep(1500);
    breatheLoop();
}

async function breatheLoop() {
    while (running) {

        label.innerText = "INHALE";
        speak("Inhale");
        heart.style.transform = "scale(1.6)";
        await sleep(4000);

        label.innerText = "EXHALE";
        speak("Exhale");
        heart.style.transform = "scale(1)";
        await sleep(6000);

    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
