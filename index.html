<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
body {
 margin:0;
 overflow:hidden;
 background:#87ceeb;
 touch-action:none; /* 🔥 stops zoom / camera movement */
}
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 8px black;
 font-size:18px;
}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c"></canvas>

<audio id="music" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b1f6c.mp3"></audio>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let playing = true;
let score = 0;
let highScore = localStorage.getItem("hs") || 0;

let startTime = Date.now();

// player
let p = { x:120, y:c.height/2, vy:0 };

// pipes
let pipes = [];
let spawn = 0;

// difficulty base
let baseSpeed = 2.5;
let baseGap = 190;

// start music after first tap
let started = false;

// INPUT (FIXED)
function flap(e){
 e.preventDefault();

 if(!started){
   document.getElementById("music").volume = 0.3;
   document.getElementById("music").play();
   started = true;
 }

 if(!playing) return location.reload();

 p.vy = -7; // tight control
}
document.addEventListener("touchstart", flap, {passive:false});
document.addEventListener("mousedown", flap);

// LOOP
function loop(){

 let timeAlive = (Date.now() - startTime) / 1000;
 let level = Math.floor(timeAlive / 30);

 // SMOOTH progression (not harsh jumps)
 let speed = baseSpeed + level * 0.4;
 let gap = baseGap - level * 10;

 if(gap < 110) gap = 110;

 // SKY (better gradient)
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#6ec6ff");
 sky.addColorStop(1,"#ffffff");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // subtle clouds
 ctx.fillStyle="rgba(255,255,255,0.6)";
 ctx.beginPath();
 ctx.arc(200,100,30,0,Math.PI*2);
 ctx.arc(240,100,25,0,Math.PI*2);
 ctx.fill();

 // spawn pipes
 spawn--;
 if(spawn<=0){
   let top = Math.random()*(c.height-300);

   pipes.push({
     x:c.width,
     top,
     bottom:top+gap,
     scored:false
   });

   spawn = 110 - level*5;
   if(spawn < 60) spawn = 60;
 }

 // draw pipes
 pipes.forEach(pipe=>{
   pipe.x -= speed;

   // gradient pipes (better look)
   let grad = ctx.createLinearGradient(pipe.x,0,pipe.x+60,0);
   grad.addColorStop(0,"#ff6b81");
   grad.addColorStop(1,"#ff4757");

   ctx.fillStyle = grad;
   ctx.fillRect(pipe.x, 0, 60, pipe.top);
   ctx.fillRect(pipe.x, pipe.bottom, 60, c.height);

   // heart indicator
   ctx.font="24px sans-serif";
   ctx.fillText("💖", pipe.x+12, pipe.top+80);

   if(!pipe.scored && pipe.x < p.x){
     score++;
     pipe.scored = true;
   }

   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(pipe=>pipe.x>-60);

 // physics (tight, not floaty)
 p.vy += 0.5;
 if(p.vy > 8) p.vy = 8;
 p.y += p.vy;

 if(p.y < 0) p.y = 0;
 if(p.y > c.height) playing = false;

 // player (glow)
 ctx.shadowBlur = 15;
 ctx.shadowColor = "red";
 ctx.font="42px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // high score
 if(!playing && score > highScore){
   highScore = score;
   localStorage.setItem("hs", highScore);
 }

 // UI
 document.getElementById("ui").innerText =
   playing
   ? "Score: "+score+" | High: "+highScore+" | Level: "+(level+1)
   : "Game Over — "+score+" | High: "+highScore+" (tap)";

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
