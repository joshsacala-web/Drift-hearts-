<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Drift Therapeutic (AFib Calm System)</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
}#overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.75)); z-index: 1; }

canvas { position: absolute; top: 0; left: 0; z-index: 2; }

#ui { z-index: 3; text-align: center; max-width: 420px; }

#heart { width: 160px; height: 160px; margin: 20px auto; position: relative; transform: scale(1); transition: transform 0.2s; }

#heart::before, #heart::after { content: ""; position: absolute; top: 0; width: 80px; height: 120px; border-radius: 80px 80px 0 0; background: #ff4d6d; }

#heart::before { left: 80px; transform: rotate(-45deg); } #heart::after { left: 0; transform: rotate(45deg); }

#fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: rgba(255,255,255,0.2); transition: height 1s ease; }

button { padding: 12px 18px; border: none; border-radius: 12px; background: #00e0ff; font-weight: bold; cursor: pointer; }

#text { margin-top: 10px; font-size: 16px; opacity: 0.95; }

#mode { font-size: 12px; opacity: 0.7; margin-top: 5px; } </style>

</head>
<body><div id="overlay"></div>
<canvas id="waves"></canvas><div id="ui">
  <div id="heart"><div id="fill"></div></div>
  <button onclick="start()">Start Therapeutic Drift</button>
  <div id="text">When ready, begin slow breathing</div>
  <div id="mode">therapeutic regulation mode</div>
</div><script>
const canvas = document.getElementById("waves");
const ctx = canvas.getContext("2d");

function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}window.onresize=resize;resize();

let running=false,startTime,lastCycle=-1,fill=0,calm=0;

function draw(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  let base=canvas.height*0.8;

  for(let i=0;i<3;i++){
    ctx.beginPath();
    ctx.moveTo(0,base);
    for(let x=0;x<canvas.width;x++){
      let y=base+Math.sin(x*0.01+t*(0.5+i*0.15))*(10+calm*20);
      ctx.lineTo(x,y);
    }
    ctx.strokeStyle=`rgba(255,255,255,${0.12-i*0.04})`;
    ctx.stroke();
  }
}

function start(){running=true;startTime=Date.now();fill=0;calm=0;loop();}

function loop(){
  if(!running)return;
  let t=(Date.now()-startTime)/1000;
  draw(t);

  let breath=Math.sin(t*(0.6+calm*0.1));

  document.getElementById("heart").style.transform=`scale(${1+breath*0.07})`;

  if(breath>0.2){
    document.getElementById("text").innerText="inhale slowly";
  }else if(breath<-0.2){
    document.getElementById("text").innerText="exhale fully";
  }else{
    document.getElementById("text").innerText="settling...";
  }

  calm+=0.0009;
  calm=Math.min(calm,1);

  let cycle=Math.floor(t/6);
  if(cycle!==lastCycle){
    lastCycle=cycle;
    fill=Math.min(fill+15+calm*5,100);
    document.getElementById("fill").style.height=fill+"%";
  }

  requestAnimationFrame(loop);
}

window.addEventListener("click",()=>{
  running=false;
  fill=0;calm=0;
  document.getElementById("fill").style.height="0%";
  document.getElementById("text").innerText="session reset";
});
</script></body>
</html>
