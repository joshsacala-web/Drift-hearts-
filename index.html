<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
html, body {
 margin:0;
 padding:0;
 overflow:hidden;
 touch-action:none;
 overscroll-behavior:none;
 background:#87ceeb;
}
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 6px black;
 font-size:16px;
}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let playing = true;
let score = 0;
let highScore = localStorage.getItem("hs") || 0;

let startTime = Date.now();

// player
let p = { x:120, y:c.height/2, vy:0 };

// pipes
let pipes = [];
let spawn = 0;

// input (FIXED)
function flap(e){
 e.preventDefault();

 if(!playing){
   location.reload();
   return;
 }

 // reset upward velocity cleanly
 p.vy = -6.5;
}
document.addEventListener("touchstart", flap, {passive:false});
document.addEventListener("mousedown", flap);

// loop
function loop(){

 let time = (Date.now() - startTime)/1000;
 let level = Math.floor(time / 30);

 // MUCH smoother difficulty
 let speed = 2.2 + level * 0.25;
 let gap = 200 - level * 8;

 if(gap < 140) gap = 140;

 // SKY (better)
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#6ec6ff");
 sky.addColorStop(1,"#eaf7ff");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // spawn pipes (FIXED spacing)
 spawn--;
 if(spawn <= 0){
   let top = Math.random() * (c.height - 300);

   pipes.push({
     x: c.width,
     top: top,
     bottom: top + gap,
     scored:false
   });

   // consistent spacing (this was your biggest issue)
   spawn = 140 - level * 5;
   if(spawn < 90) spawn = 90;
 }

 // draw pipes (ROUNDED + nicer)
 pipes.forEach(pipe=>{
   pipe.x -= speed;

   ctx.fillStyle="#ff5a76";

   // top
   ctx.beginPath();
   ctx.roundRect(pipe.x, 0, 60, pipe.top, 10);
   ctx.fill();

   // bottom
   ctx.beginPath();
   ctx.roundRect(pipe.x, pipe.bottom, 60, c.height, 10);
   ctx.fill();

   // gap marker
   ctx.font="22px sans-serif";
   ctx.fillText("💖", pipe.x+14, pipe.top+90);

   // score
   if(!pipe.scored && pipe.x < p.x){
     score++;
     pipe.scored = true;
   }

   // collision
   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(p=>p.x > -60);

 // physics (balanced)
 p.vy += 0.45;
 if(p.vy > 7) p.vy = 7;

 p.y += p.vy;

 if(p.y < 0) p.y = 0;
 if(p.y > c.height) playing = false;

 // player
 ctx.shadowBlur = 12;
 ctx.shadowColor = "red";
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // save high score
 if(!playing && score > highScore){
   highScore = score;
   localStorage.setItem("hs", highScore);
 }

 // UI
 document.getElementById("ui").innerText =
   playing
   ? "Score: "+score+" | High: "+highScore+" | Level: "+(level+1)
   : "Game Over — "+score+" (tap)";

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
