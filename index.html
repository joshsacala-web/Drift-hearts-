<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let last = 0;
let score = 0;

// player
let x = c.width/2;
let y = c.height*0.65;
let vy = 0;
let grounded = true;

// wave
let waveX = -200;
let waveSpeed = 300; // px/sec

// audio
let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq, dur=0.1){
 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value = freq;
 g.gain.value = 0.05;
 o.start();
 o.stop(audioCtx.currentTime + dur);
}

// jump
function jump(){
 if(grounded){
   vy = -600;
   grounded = false;
   beep(500);
 }
}
document.addEventListener("mousedown", jump);
document.addEventListener("touchstart", jump);

// loop
function loop(ts){
 let dt = (ts - last)/1000;
 last = ts;

 // SKY
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#7ec8ff");
 sky.addColorStop(1,"#ffd2a6");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // OCEAN
 ctx.fillStyle="#3aa6d6";
 ctx.fillRect(0,c.height*0.6,c.width,c.height);

 // SAND
 ctx.fillStyle="#f4d9a0";
 ctx.fillRect(0,c.height*0.65,c.width,c.height);

 // WAVE (smooth rolling)
 waveX += waveSpeed * dt;

 ctx.beginPath();
 for(let i=0;i<80;i++){
   let px = waveX + i*2;
   let py = c.height*0.65 - Math.sin(i*0.2)*15;
   if(i===0) ctx.moveTo(px,py);
   else ctx.lineTo(px,py);
 }
 ctx.lineTo(waveX+160,c.height*0.65);
 ctx.lineTo(waveX,c.height*0.65);
 ctx.fillStyle="white";
 ctx.fill();

 // foam glow
 ctx.shadowBlur = 15;
 ctx.shadowColor = "white";
 ctx.fill();
 ctx.shadowBlur = 0;

 // reset wave
 if(waveX > c.width + 100){
   waveX = -200;
   score++;
   beep(800,0.12);
 }

 // physics
 vy += 1500 * dt;
 y += vy * dt;

 if(y >= c.height*0.65){
   y = c.height*0.65;
   vy = 0;
   grounded = true;
 }

 // collision
 if(waveX < x+20 && waveX+160 > x-20 && y >= c.height*0.63){
   score = 0;
   beep(150,0.2);
 }

 // player (heart with glow)
 ctx.font="40px sans-serif";
 ctx.shadowBlur = 10;
 ctx.shadowColor = "red";
 ctx.fillText("❤️", x-15, y);
 ctx.shadowBlur = 0;

 // UI
 document.getElementById("ui").innerText = "Score: " + score;

 requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
