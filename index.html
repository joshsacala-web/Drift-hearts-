<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
body{
 margin:0;
 overflow:hidden;
 touch-action:none;
 background:#87ceeb;
}
canvas{display:block;}
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 6px black;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<audio id="ocean" loop src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3"></audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let playing = false;
let gameOver = false;
let score = 0;
let time = 0;

// player
let p = { x:120, y:c.height/2, vy:0 };

// bird (ONLY ONE)
let birds = [];

// audio control
let audioStarted = false;

// INPUT
function flap(e){
 e.preventDefault();

 if(!playing){
   playing = true;
   gameOver = false;
   score = 0;
   birds = [];
 }

 if(!audioStarted){
   let ocean = document.getElementById("ocean");
   ocean.volume = 0.5;
   ocean.play().catch(()=>{});
   audioStarted = true;
 }

 if(gameOver){
   location.reload();
 }

 p.vy = -6;
}

document.addEventListener("touchstart", flap, {passive:false});
document.addEventListener("mousedown", flap);

// LOOP
function loop(){

 time += 0.01;

 // 🌅 SKY
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#4fc3f7");
 sky.addColorStop(0.6,"#b3e5fc");
 sky.addColorStop(1,"#ffe0b2");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // 🌊 OCEAN
 ctx.fillStyle = "#26c6da";
 ctx.fillRect(0, c.height*0.6, c.width, c.height*0.15);

 // 🌊 FOAM WAVES
 ctx.strokeStyle = "rgba(255,255,255,0.7)";
 ctx.beginPath();
 for(let x=0;x<c.width;x+=8){
   let y = c.height*0.6 + Math.sin(x*0.02 + time*3)*6;
   ctx.lineTo(x,y);
 }
 ctx.stroke();

 // 🏖 SAND
 ctx.fillStyle = "#f4e2b0";
 ctx.fillRect(0, c.height*0.75, c.width, c.height);

 // 🐦 SPAWN ONE BIRD ONLY
 if(playing && !gameOver && birds.length === 0){
   birds.push({
     x:c.width,
     y:Math.random()*c.height*0.5+50,
     phase:Math.random()*10
   });
 }

 // 🐦 BIRD LOGIC
 birds.forEach(b=>{
   b.x -= 2.2;

   // swoop
   b.phase += 0.04;
   b.y += Math.sin(b.phase)*1.2;

   // slight tracking toward player
   b.y += (p.y - b.y)*0.002;

   ctx.font="32px sans-serif";
   ctx.fillText("🐦", b.x, b.y);

   // collision
   if(
     p.x < b.x+30 &&
     p.x+30 > b.x &&
     p.y < b.y+30 &&
     p.y+30 > b.y
   ){
     gameOver = true;
   }

   // score when passed
   if(b.x < p.x && !b.passed){
     score++;
     b.passed = true;
   }
 });

 birds = birds.filter(b=>b.x > -50);

 // physics
 if(playing && !gameOver){
   p.vy += 0.45;
   if(p.vy > 7) p.vy = 7;
   p.y += p.vy;

   if(p.y < 0) p.y = 0;
   if(p.y > c.height) gameOver = true;
 }

 // ❤️ PLAYER
 ctx.shadowBlur = 10;
 ctx.shadowColor = "red";
 ctx.font="42px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // UI
 if(!playing){
   document.getElementById("ui").innerText = "Tap to Start";
 } 
 else if(gameOver){
   document.getElementById("ui").innerText = "Game Over — " + score + " (tap)";
 } 
 else{
   document.getElementById("ui").innerText = "Score: " + score;
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
