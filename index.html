<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// camera
let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

// renderer
let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT (sun)
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ambient light
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

// SAND
let sandGeo = new THREE.PlaneGeometry(50, 50);
let sandMat = new THREE.MeshStandardMaterial({ color: 0xf4d9a0 });
let sand = new THREE.Mesh(sandGeo, sandMat);
sand.rotation.x = -Math.PI/2;
scene.add(sand);

// WATER
let waterGeo = new THREE.PlaneGeometry(50, 20, 100, 100);
let waterMat = new THREE.MeshStandardMaterial({
 color: 0x3aa6d6,
 metalness:0.3,
 roughness:0.2
});
let water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI/2;
water.position.z = -10;
scene.add(water);

// PLAYER (simple sphere)
let playerGeo = new THREE.SphereGeometry(0.5, 32, 32);
let playerMat = new THREE.MeshStandardMaterial({color:0xff0000});
let player = new THREE.Mesh(playerGeo, playerMat);
player.position.set(0,0.5,0);
scene.add(player);

// movement target
let targetX = 0;

window.addEventListener("mousemove", e=>{
 targetX = (e.clientX / innerWidth - 0.5) * 20;
});

window.addEventListener("touchmove", e=>{
 targetX = (e.touches[0].clientX / innerWidth - 0.5) * 20;
});

// animate waves
function animate(){
 requestAnimationFrame(animate);

 let time = Date.now() * 0.001;

 // wave effect
 let pos = water.geometry.attributes.position;
 for(let i=0;i<pos.count;i++){
   let x = pos.getX(i);
   let y = pos.getY(i);
   pos.setZ(i, Math.sin(x*0.3 + time)*0.3 + Math.sin(y*0.5 + time)*0.2);
 }
 pos.needsUpdate = true;

 // smooth movement
 player.position.x += (targetX - player.position.x)*0.05;

 renderer.render(scene, camera);
}

animate();

// resize
window.addEventListener("resize", ()=>{
 camera.aspect = innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
