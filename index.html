<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart - Beach</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🎥 VIDEO BACKGROUND */
video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* DARK OVERLAY FOR READABILITY */
.overlay-dark {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: -1;
}

/* APP */
#app {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
}

/* HEART */
.heart {
    width: 180px;
    margin: auto;
    transform: scale(1);
    transition: transform linear;
    filter: drop-shadow(0 0 35px rgba(255,80,80,0.9));
}

.heart svg {
    width: 100%;
}

/* TEXT */
#label {
    margin-top: 30px;
    font-size: 34px;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* START SCREEN */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    margin-top: 15px;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

#startBtn { background: #ef4444; color: white; }
#soundBtn { background: #334155; color: white; }

</style>
</head>

<body>

<!-- 🎥 VIDEO (royalty-free beach) -->
<video autoplay muted loop playsinline id="bgVideo">
    <source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-waves-1573/1080p.mp4" type="video/mp4">
</video>

<div class="overlay-dark"></div>

<!-- 🌊 REAL OCEAN AUDIO -->
<audio id="oceanAudio" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b4c9d.mp3" type="audio/mpeg">
</audio>

<!-- START -->
<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <p>Listen. Follow. Breathe.</p>
    <button id="startBtn" onclick="start()">Start</button>
    <button id="soundBtn" onclick="toggleSound()">Sound: ON</button>
</div>

<!-- APP -->
<div id="app">
    <div class="heart" id="heart">
        <svg viewBox="0 0 24 24" fill="#ff4d4d">
            <path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3C9.5 3 12 5 12 5s2.5-2 4.5-2C21 3 21 8 21 12.5S12 21 12 21z"/>
        </svg>
    </div>
    <div id="label">READY</div>
</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");
let ocean = document.getElementById("oceanAudio");

let running = false;
let soundOn = true;

/* 🔊 VOICE */
function speak(text) {
    if (!soundOn) return;

    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.75;
    msg.pitch = 0.8;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function toggleSound() {
    soundOn = !soundOn;
    document.getElementById("soundBtn").innerText =
        "Sound: " + (soundOn ? "ON" : "OFF");

    if (!soundOn) ocean.pause();
    else ocean.play();
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;

    if (soundOn) {
        ocean.volume = 0.4;
        ocean.play();
    }

    intro();
}

async function intro() {
    speak("Follow the heart");
    await sleep(1500);
    breatheLoop();
}

async function breatheLoop() {
    while (running) {

        // INHALE
        label.innerText = "INHALE";
        speak("Inhale");
        heart.style.transition = "transform 4s ease-in-out";
        heart.style.transform = "scale(1.6)";
        await sleep(4000);

        // HOLD
        label.innerText = "HOLD";
        await sleep(800);

        // EXHALE
        label.innerText = "EXHALE";
        speak("Exhale");
        heart.style.transition = "transform 6s ease-in-out";
        heart.style.transform = "scale(1)";
        await sleep(6000);

        label.innerText = "";
        await sleep(500);
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
