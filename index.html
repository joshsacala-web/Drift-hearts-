<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 8px black;
 font-size:20px;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let playing = true;
let score = 0;

// player
let p = {
 x: 120,
 y: c.height/2,
 vy: 0
};

// obstacles
let pipes = [];
let spawn = 0;

// input
function flap(){
 if(!playing) return location.reload();
 p.vy = -8;
}
document.addEventListener("mousedown", flap);
document.addEventListener("touchstart", flap);

// loop
function loop(){

 // sky gradient
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#7ec8ff");
 sky.addColorStop(1,"#dff6ff");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // spawn
 spawn--;
 if(spawn<=0){
   let gap = 140;
   let top = Math.random()*(c.height-300);

   pipes.push({
     x:c.width,
     top,
     bottom:top+gap,
     scored:false
   });

   spawn = 90;
 }

 // draw obstacles
 pipes.forEach(pipe=>{
   pipe.x -= 3;

   // top block
   ctx.fillStyle="#ff6b81";
   ctx.fillRect(pipe.x, 0, 60, pipe.top);

   // bottom block
   ctx.fillRect(pipe.x, pipe.bottom, 60, c.height);

   // heart gap indicator
   ctx.font="30px sans-serif";
   ctx.fillText("💖", pipe.x+10, pipe.top+70);

   // score
   if(!pipe.scored && pipe.x < p.x){
     score++;
     pipe.scored = true;
   }

   // collision
   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(pipe=>pipe.x>-60);

 // physics
 p.vy += 0.4;
 p.y += p.vy;

 if(p.y < 0 || p.y > c.height){
   playing = false;
 }

 // player glow
 ctx.shadowBlur = 15;
 ctx.shadowColor = "red";
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // UI
 document.getElementById("ui").innerText =
   playing
   ? "Score: " + score
   : "Game Over — " + score + " (tap to restart)";

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
