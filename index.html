<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block}
#ui{
 position:fixed;inset:0;
 display:flex;align-items:center;justify-content:center;
 color:white;font-size:24px;
 background:rgba(0,0,0,0.6);
 z-index:10;
 text-align:center;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<audio id="ocean" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3">
</audio>

<script>
const c=document.getElementById("c"),ctx=c.getContext("2d");

function resize(){
 c.width=innerWidth;
 c.height=innerHeight;
 joy.baseX=c.width/2;
 joy.baseY=c.height*0.85;
}
resize();addEventListener("resize",resize);

// STATE
let state="start";
let score=0,time=0;

// PLAYER (smooth movement)
let p={x:150,y:c.height/2,vx:0,vy:0};

// JOYSTICK
let joy={x:0,y:0,baseX:c.width/2,baseY:c.height*0.85,active:false};

// ENTITIES
let birds=[];

// AUDIO
let audioStarted=false;

// RESET
function reset(){
 score=0;
 birds=[];
 p.x=150; p.y=c.height/2;
 p.vx=0; p.vy=0;
 state="play";
 document.getElementById("ui").style.display="none";

 // start audio once
 if(!audioStarted){
   let a=document.getElementById("ocean");
   a.volume=0.5;
   a.play().catch(()=>{});
   audioStarted=true;
 }
}

// INPUT
addEventListener("pointerdown",()=>{
 if(state!=="play") reset();
 joy.active=true;
});

addEventListener("pointermove",e=>{
 if(!joy.active)return;

 joy.x=e.clientX-joy.baseX;
 joy.y=e.clientY-joy.baseY;

 let m=60;
 joy.x=Math.max(-m,Math.min(m,joy.x));
 joy.y=Math.max(-m,Math.min(m,joy.y));
});

addEventListener("pointerup",()=>{
 joy.active=false;
 joy.x=0; joy.y=0;
});

// DRAW SCENE (more depth)
function drawScene(){

 time+=0.01;

 let g=ctx.createLinearGradient(0,0,0,c.height);
 g.addColorStop(0,"#6fd3ff");
 g.addColorStop(0.5,"#aee9ff");
 g.addColorStop(1,"#ffd6a5");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);

 // sun glow
 let sun=ctx.createRadialGradient(
   c.width*0.8,c.height*0.2,10,
   c.width*0.8,c.height*0.2,120
 );
 sun.addColorStop(0,"rgba(255,255,200,1)");
 sun.addColorStop(1,"rgba(255,255,200,0)");
 ctx.fillStyle=sun;
 ctx.beginPath();
 ctx.arc(c.width*0.8,c.height*0.2,120,0,Math.PI*2);
 ctx.fill();

 // ocean
 ctx.fillStyle="#1fb6ff";
 ctx.fillRect(0,c.height*0.55,c.width,c.height);

 // waves
 ctx.strokeStyle="rgba(255,255,255,0.3)";
 for(let l=0;l<4;l++){
   ctx.beginPath();
   for(let x=0;x<c.width;x+=8){
     let y=c.height*0.55+
       Math.sin(x*0.02+time*(2+l))*(5+l*2);
     ctx.lineTo(x,y);
   }
   ctx.stroke();
 }

 ctx.fillStyle="#f5deb3";
 ctx.fillRect(0,c.height*0.8,c.width,c.height);
}

// BETTER BIRD (flap)
function drawBird(b){
 let flap=Math.sin(time*10)*5;

 ctx.beginPath();
 ctx.moveTo(b.x,b.y);
 ctx.quadraticCurveTo(b.x+10,b.y-flap,b.x+20,b.y);
 ctx.quadraticCurveTo(b.x+10,b.y+flap,b.x,b.y);
 ctx.fillStyle="#222";
 ctx.fill();
}

// LOOP
function loop(){

 drawScene();

 if(state==="play"){

   // SMOOTH MOVEMENT
   p.vx += (joy.x*0.1 - p.vx)*0.2;
   p.vy += (joy.y*0.1 - p.vy)*0.2;

   p.x += p.vx;
   p.y += p.vy;

   p.x=Math.max(0,Math.min(c.width,p.x));
   p.y=Math.max(0,Math.min(c.height,p.y));

   // spawn
   if(Math.random()<0.02){
     birds.push({
       x:c.width,
       y:Math.random()*c.height*0.6
     });
   }

   birds.forEach(b=>{
     b.x-=3;
     drawBird(b);

     if(Math.abs(p.x-b.x)<20 && Math.abs(p.y-b.y)<20){
       state="gameover";
       document.getElementById("ui").innerText="Game Over\nTap to Restart";
       document.getElementById("ui").style.display="flex";
     }
   });

   birds=birds.filter(b=>b.x>-50);
   score++;
 }

 // PLAYER
 ctx.font="42px sans-serif";
 ctx.fillText("❤️",p.x-20,p.y+10);

 // JOYSTICK
 ctx.beginPath();
 ctx.arc(joy.baseX,joy.baseY,50,0,Math.PI*2);
 ctx.strokeStyle="white";
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(joy.baseX+joy.x,joy.baseY+joy.y,22,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.fill();

 // UI
 ctx.fillStyle="white";
 ctx.fillText("Score "+score,20,40);

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
