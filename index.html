<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
canvas { display:block; touch-action:none; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-size:18px;
 text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<canvas id="c"></canvas>

<audio id="ocean" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8c8f6c7.mp3">
</audio>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let t = 0;
let score = 0;
let started = false;

// player
let x = c.width/2;
let y = c.height*0.75;
let tx = x, ty = y;

// items
let items = [];
let splashes = [];

// audio
let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function ping(freq){
 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value = freq;
 g.gain.value = 0.05;
 o.start();
 o.stop(audioCtx.currentTime + 0.1);
}

// start
c.addEventListener("touchstart", start);
c.addEventListener("mousedown", start);

function start(e){
 if(!started){
   document.getElementById("ocean").volume = 0.3;
   document.getElementById("ocean").play();
   started = true;
 }
 move(e);
}

// movement
c.addEventListener("touchmove", move);
c.addEventListener("mousemove", move);

function move(e){
 let px = e.touches ? e.touches[0].clientX : e.clientX;
 let py = e.touches ? e.touches[0].clientY : e.clientY;
 tx = px;
 ty = py;

 // splash if near water
 if(py < c.height*0.65){
   splashes.push({x:px, y:py, r:0});
 }
}

// spawn
function spawn(){
 let types = ["❤️","🐚"];
 items.push({
   x: Math.random()*c.width,
   y: c.height*0.65 + Math.random()*100,
   vx:(Math.random()-0.5)*0.3,
   emoji:types[Math.floor(Math.random()*2)]
 });
}

// loop
function loop(){
 t += 0.02;

 // SKY
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#87ceeb");
 sky.addColorStop(1,"#fca");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // SUN
 ctx.beginPath();
 ctx.arc(c.width*0.8, 120 + Math.sin(t)*5, 40, 0, Math.PI*2);
 ctx.fillStyle="rgba(255,220,120,0.9)";
 ctx.fill();

 // OCEAN DEPTH
 let ocean = ctx.createLinearGradient(0,c.height*0.5,0,c.height);
 ocean.addColorStop(0,"#3ba7d6");
 ocean.addColorStop(1,"#0b3c5d");
 ctx.fillStyle=ocean;
 ctx.fillRect(0,c.height*0.5,c.width,c.height);

 // WAVES + FOAM
 ctx.beginPath();
 for(let px=0;px<c.width;px++){
   let y = c.height*0.6 + Math.sin(px*0.02 + t)*10;
   ctx.lineTo(px,y);
 }
 ctx.strokeStyle="white";
 ctx.lineWidth=2;
 ctx.stroke();

 // WET SAND
 ctx.fillStyle="#d2b48c";
 ctx.fillRect(0,c.height*0.6,c.width,50);

 // DRY SAND
 ctx.fillStyle="#f4d9a0";
 ctx.fillRect(0,c.height*0.65,c.width,c.height);

 // player smoothing
 x += (tx-x)*0.08;
 y += (ty-y)*0.08;

 // glow when moving
 ctx.shadowBlur = 15;
 ctx.shadowColor = "white";

 ctx.font="32px sans-serif";
 ctx.fillText("❤️",x,y);

 ctx.shadowBlur = 0;

 // splashes
 splashes.forEach(s=>{
   s.r+=2;
   ctx.beginPath();
   ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
   ctx.strokeStyle="rgba(255,255,255,"+(1-s.r/30)+")";
   ctx.stroke();
 });
 splashes = splashes.filter(s=>s.r<30);

 // spawn items
 if(Math.random()<0.03) spawn();

 items.forEach(o=>{
   o.x+=o.vx;
   ctx.fillText(o.emoji,o.x,o.y);

   if(Math.abs(o.x-x)<25 && Math.abs(o.y-y)<25){
     score++;
     ping(600);
     o.hit=true;
   }
 });

 items = items.filter(o=>!o.hit);

 document.getElementById("ui").innerText="Score: "+score;

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
