<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart Immersive</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🌊 BACKGROUND */
.bg {
    position: fixed;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
    filter: brightness(0.7);
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* 🌊 WAVE */
.wave {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 200px;
    background: rgba(255,255,255,0.12);
    border-radius: 40%;
    animation: waveFlow 8s linear infinite;
}

@keyframes waveFlow {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

/* ❤️ HEART */
.heart {
    font-size: 120px;
    text-align: center;
    margin-top: 30vh;
    transition: transform 0.15s ease;
    filter: drop-shadow(0 0 25px rgba(255,60,60,0.9));
}

/* TEXT */
#label { text-align:center; font-size:28px; margin-top:10px; }
#feedback { text-align:center; opacity:0.8; }
#timer { text-align:center; opacity:0.6; }

/* START */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button {
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="wave" id="wave"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button onclick="start()">Start</button>
</div>

<div class="heart" id="heart">❤️</div>
<div id="label">READY</div>
<div id="feedback"></div>
<div id="timer">60</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");
let feedback = document.getElementById("feedback");
let timerEl = document.getElementById("timer");

let ctx = new (window.AudioContext || window.webkitAudioContext)();

let running = false;
let startTime;
let total = 60;

/* 💓 HEARTBEAT SOUND */
function heartbeat() {
    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 60;

    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 0.2);
}

/* 🌊 OCEAN SOUND */
function ocean() {
    let noise = ctx.createBufferSource();
    let buffer = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    let data = buffer.getChannelData(0);

    for (let i = 0; i < data.length; i++) {
        data[i] = Math.random() * 2 - 1;
    }

    noise.buffer = buffer;

    let gain = ctx.createGain();
    gain.gain.value = 0.02;

    noise.connect(gain);
    gain.connect(ctx.destination);

    noise.loop = true;
    noise.start();
}

/* 🎧 VOICE */
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    ctx.resume();
    ocean();

    running = true;
    startTime = performance.now();
    loop();
}

function loop() {
    if (!running) return;

    let now = performance.now();
    let elapsed = (now - startTime) / 1000;
    let remaining = Math.max(0, total - elapsed);

    timerEl.innerText = Math.ceil(remaining);

    if (remaining <= 0) {
        endSession();
        return;
    }

    let cycle = elapsed % 10;

    if (cycle < 4) {
        label.innerText = "Inhale";
        heart.style.transform = "scale(" + (1 + cycle * 0.12) + ")";
        feedback.innerText = "Breathing in";

        if (Math.floor(cycle) === 0) {
            speak("Inhale");
            heartbeat();
        }

    } else {
        let t = (cycle - 4) / 6;
        label.innerText = "Exhale";
        heart.style.transform = "scale(" + (1.5 - t * 0.5) + ")";
        feedback.innerText = "Let go";

        if (Math.floor(cycle) === 4) {
            speak("Exhale");
            heartbeat();
        }
    }

    requestAnimationFrame(loop);
}

function endSession() {
    running = false;

    label.innerText = "You're back in control";
    feedback.innerText = "";
    timerEl.innerText = "";

    speak("You're back in control");

    let btn = document.createElement("button");
    btn.innerText = "Retry";
    btn.onclick = () => location.reload();

    document.body.appendChild(btn);
}

</script>

</body>
</html>
