<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saxson 2</title><!-- PWA META --><meta name="theme-color" content="#000000">
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;Saxson 2&quot;,
  &quot;short_name&quot;:&quot;Saxson2&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#000000&quot;,
  &quot;theme_color&quot;:&quot;#000000&quot;,
  &quot;start_url&quot;:&quot;.&quot;
}"><style>
body{
  margin:0;
  background:radial-gradient(circle,#111,#000);
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
}

h2{
  color:gold;
  text-shadow:0 0 15px gold;
}

#reels{
  display:flex;
  gap:6px;
  padding:10px;
  justify-content:center;
}

.reel{
  width:18%;
  height:240px;
  overflow:hidden;
  border:2px solid gold;
  border-radius:12px;
  background:#000;
  position:relative;
}

.strip{
  position:absolute;
  width:100%;
}

.symbol{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

#ui{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

button{
  background:gold;
  border:none;
  padding:10px 20px;
  border-radius:8px;
}

.winflash{
  animation:flash 0.6s 3;
}

@keyframes flash{
  0%{box-shadow:0 0 5px gold;}
  50%{box-shadow:0 0 25px gold;}
  100%{box-shadow:0 0 5px gold;}
}

/* BONUS OVERLAY */
#bonusOverlay{
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:radial-gradient(circle,rgba(255,200,0,0.9),rgba(0,0,0,0.95));
 display:flex;
 align-items:center;
 justify-content:center;
 opacity:0;
 transition:0.4s;
 z-index:999;
}

#bonusText{
 font-size:50px;
 text-shadow:0 0 30px gold;
 animation:pulse 0.6s infinite;
}

@keyframes pulse{
 50%{transform:scale(1.2);}
}

.shake{
 animation:shake 0.4s;
}

@keyframes shake{
 25%{transform:translate(5px,-5px);}
 50%{transform:translate(-5px,5px);}
 75%{transform:translate(5px,5px);}
}
</style></head><body><h2>🎸 SAXSON 2 🎸</h2><div id="reels"></div><div id="ui">
<div>$<span id="money">100.00</span></div>
<div>🎁 <span id="spins">0</span></div>
<div>x<span id="multi">1</span></div>
<button onclick="spin()">SPIN</button>
</div><div id="bonusOverlay">
  <div id="bonusText">🔥 BONUS 🔥</div>
</div><script>

// INLINE SERVICE WORKER (ONE FILE MAGIC)
if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => {});
  `;
  const blob = new Blob([swCode], {type: 'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

// AUDIO (simple synth)
function sound(freq){
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let o=ctx.createOscillator();
  o.frequency.value=freq;
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.1);
}

// SYMBOLS
const symbols=["🎸","💀","🔥","🦅","🎤","🏍️","W"];

let money=100, free=0, multi=1;
let sticky=[[],[],[],[],[]];

const reelsEl=document.getElementById("reels");

// BUILD REELS
function build(){
 reelsEl.innerHTML="";
 for(let i=0;i<5;i++){
  let reel=document.createElement("div");
  reel.className="reel";

  let strip=document.createElement("div");
  strip.className="strip";

  for(let j=0;j<25;j++){
   let d=document.createElement("div");
   d.className="symbol";
   d.innerText=random();
   strip.appendChild(d);
  }

  reel.appendChild(strip);
  reelsEl.appendChild(reel);
 }
}
build();

function random(){
 return symbols[Math.floor(Math.random()*symbols.length)];
}

// SPIN
function spin(){

 if(money<0.5 && free<=0) return;

 if(free>0) free--; else money-=0.5;

 let strips=document.querySelectorAll(".strip");
 let result=[[],[],[],[],[]];

 strips.forEach((s,i)=>{

  let dist=(Math.random()*10+15)*80;

  s.style.transition="top 0.8s ease-out";
  s.style.top=-dist+"px";

  setTimeout(()=>{

    sound(200+i*50);

    s.style.transition="none";
    s.style.top="0";
    s.innerHTML="";

    for(let j=0;j<25;j++){

      let sym=(free>0 && sticky[i][j])?"W":random();

      let d=document.createElement("div");
      d.className="symbol";
      d.innerText=sym;
      s.appendChild(d);

      if(j<3){
        result[i][j]=sym;
        if(free>0 && sym==="W") sticky[i][j]=true;
      }
    }

    if(i===4){
      setTimeout(()=>check(result),100);
    }

  },800+i*120);

 });

 update();
}

// CHECK WIN
function check(r){

 let win=0;

 for(let row=0;row<3;row++){
  let base=r[0][row];
  let count=1;

  for(let col=1;col<5;col++){
   if(r[col][row]===base || r[col][row]==="W") count++;
   else break;
  }

  if(count>=3) win+=count*2;
 }

 // BONUS
 if(r[1][1]==="🎤" && r[3][1]==="🏍️"){
  startBonus();
 }

 if(win>0){
  if(free>0) multi++;
  money+=win*multi;

  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),400);

  flash();
  sound(400);
 }

 update();
}

// BONUS
function startBonus(){

 free=Math.floor(Math.random()*26)+5;
 multi=1;
 sticky=[[],[],[],[],[]];

 let o=document.getElementById("bonusOverlay");
 o.style.opacity="1";

 sound(100);

 document.body.classList.add("shake");
 setTimeout(()=>document.body.classList.remove("shake"),400);

 setTimeout(()=>o.style.opacity="0",1500);
}

// FLASH
function flash(){
 document.querySelectorAll(".reel").forEach(r=>{
  r.classList.add("winflash");
  setTimeout(()=>r.classList.remove("winflash"),800);
 });
}

// UI
function update(){
 money.innerText=money.toFixed(2);
 spins.innerText=free;
 multi.innerText=multi;
}

</script></body>
</html>
