<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart Immersive</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* 🌊 BEACH */
.bg {
    position: fixed;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
    filter: brightness(0.75);
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
}

/* 🌊 WAVE */
.wave {
    position: absolute;
    bottom: -20%;
    width: 200%;
    height: 50%;
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.25), transparent 70%);
    transition: transform 2s ease;
}

/* ❤️ HEART */
.heart-container {
    position: absolute;
    top: 25%;
    width: 100%;
    text-align: center;
}

.heart {
    width: 140px;
    height: 140px;
    margin: auto;
    position: relative;
}

.fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ff4d4d, #ff9999);
    border-radius: 50% 50% 0 0;
}

svg {
    position: absolute;
    inset: 0;
}

/* TEXT */
#label { font-size: 28px; margin-top: 20px; }
#feedback { opacity: 0.85; margin-top: 6px; }
#timer { opacity: 0.6; margin-top: 5px; }

/* START */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #ef4444;
    color: white;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="wave" id="wave"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button onclick="start()">Start</button>
</div>

<div class="heart-container">
    <div class="heart">
        <div class="fill" id="fill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3C9.5 3 12 5 12 5s2.5-2 4.5-2C21 3 21 8 21 12.5S12 21 12 21z"/>
        </svg>
    </div>

    <div id="label">READY</div>
    <div id="feedback"></div>
    <div id="timer">60</div>
</div>

<script>

let fill = document.getElementById("fill");
let label = document.getElementById("label");
let feedback = document.getElementById("feedback");
let timerEl = document.getElementById("timer");
let wave = document.getElementById("wave");

let running = false;
let startTime;
let total = 60;

/* 🎧 VOICE */
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.85;
    msg.pitch = 0.9;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
    startTime = performance.now();
    loop();
}

function loop() {
    if (!running) return;

    let now = performance.now();
    let elapsed = (now - startTime) / 1000;
    let remaining = Math.max(0, total - elapsed);

    timerEl.innerText = Math.ceil(remaining);

    if (remaining <= 0) {
        endSession();
        return;
    }

    let cycle = elapsed % 10;

    if (cycle < 4) {
        label.innerText = "Inhale";

        fill.style.height = (cycle / 4) * 100 + "%";
        wave.style.transform = "translateY(-60px)";

        if (Math.floor(cycle) === 0) speak("Inhale");

        feedback.innerText = "Let the wave lift you";
    } else {
        label.innerText = "Exhale";

        let t = (cycle - 4) / 6;
        fill.style.height = (1 - t) * 100 + "%";
        wave.style.transform = "translateY(40px)";

        if (Math.floor(cycle) === 4) speak("Exhale");

        feedback.innerText = "Let it drift away";
    }

    if (elapsed > 40) {
        feedback.innerText = "You're steady now";
    }

    requestAnimationFrame(loop);
}

function endSession() {
    running = false;

    let messages = [
        "You're back in control",
        "Your body is settling",
        "Keep this rhythm with you"
    ];

    let msg = messages[Math.floor(Math.random() * messages.length)];

    label.innerText = msg;
    feedback.innerText = "";
    timerEl.innerText = "";

    speak(msg);

    let btn = document.createElement("button");
    btn.innerText = "Try again";
    btn.onclick = () => location.reload();

    document.body.appendChild(btn);
}

</script>

</body>
</html>
