<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0;
  overflow:hidden;
  background: linear-gradient(#ff9966, #2c3e50);
  touch-action:none;
  font-family:sans-serif;
}

#msg{
 position:fixed;
 top:50%;
 width:100%;
 text-align:center;
 color:white;
 font-size:22px;
 transform:translateY(-50%);
 opacity:0.8;
}
canvas { display:block; }
</style>
</head>
<body>

<div id="msg">Tap to Relax 🌊</div>
<canvas id="c"></canvas>

<script>
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let t = 0;
let started = false;

// player (floating heart)
let x = canvas.width/2;
let y = canvas.height/2;
let tx = x;
let ty = y;

// ripple effects
let ripples = [];

// audio (soft waves)
let ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
let noise, gain;

function startSound(){
  let bufferSize = 2 * ctxAudio.sampleRate;
  let noiseBuffer = ctxAudio.createBuffer(1, bufferSize, ctxAudio.sampleRate);
  let data = noiseBuffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  noise = ctxAudio.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;

  let filter = ctxAudio.createBiquadFilter();
  filter.type = "lowpass";
  filter.frequency.value = 500;

  gain = ctxAudio.createGain();
  gain.gain.value = 0.02;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(ctxAudio.destination);

  noise.start();
}

// input
canvas.addEventListener("touchstart", tap);
canvas.addEventListener("mousedown", tap);

function tap(e){
  if(!started){
    started = true;
    document.getElementById("msg").innerText = "";
    startSound();
  }

  let px = e.touches ? e.touches[0].clientX : e.clientX;
  let py = e.touches ? e.touches[0].clientY : e.clientY;

  tx = px;
  ty = py;

  ripples.push({x:px, y:py, r:0});
}

// loop
function loop(){
  t += 0.01;

  // sky
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#ff9966");
  grad.addColorStop(1,"#2c3e50");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // sun
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height*0.3 + Math.sin(t)*10, 40, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,200,120,0.8)";
  ctx.fill();

  // waves
  for(let i=0;i<3;i++){
    ctx.beginPath();
    for(let x=0;x<canvas.width;x++){
      let y = canvas.height*0.6 + Math.sin(x*0.01 + t + i)*10 + i*20;
      ctx.lineTo(x,y);
    }
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.stroke();
  }

  // smooth movement
  x += (tx - x)*0.03;
  y += (ty - y)*0.03;

  // floating effect
  let float = Math.sin(t*2)*5;

  // heart
  ctx.font = "30px sans-serif";
  ctx.fillText("❤️", x, y + float);

  // ripples
  ripples.forEach(r=>{
    r.r += 1.5;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = "rgba(255,255,255,"+(1-r.r/80)+")";
    ctx.stroke();
  });

  ripples = ripples.filter(r=>r.r < 80);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
