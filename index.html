<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🌅 BEACH BACKGROUND (ALWAYS WORKS) */
.bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(to top, #020617, #0f172a 40%, #1e3a8a 70%, #f97316);
}

/* 🌊 OCEAN */
.ocean {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(to top, rgba(0,120,200,0.6), transparent);
}

/* APP */
#app {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
}

/* ❤️ HEART CONTAINER */
.heart {
    width: 150px;
    height: 150px;
    margin: auto;
    position: relative;
}

/* OUTLINE */
.heart svg {
    width: 100%;
    height: 100%;
}

/* FILL */
.fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: red;
    border-radius: 50% 50% 0 0;
    transition: height 4s linear;
}

/* TEXT */
#label {
    margin-top: 20px;
    font-size: 30px;
}

#timer {
    margin-top: 10px;
    font-size: 20px;
    opacity: 0.8;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    background: #ef4444;
    color: white;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="ocean"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button onclick="start()">Start</button>
</div>

<div id="app">
    <div class="heart">
        <div class="fill" id="fill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3C9.5 3 12 5 12 5s2.5-2 4.5-2C21 3 21 8 21 12.5S12 21 12 21z"/>
        </svg>
    </div>

    <div id="label">READY</div>
    <div id="timer">60</div>
</div>

<script>

let fill = document.getElementById("fill");
let label = document.getElementById("label");
let timerEl = document.getElementById("timer");

let running = false;
let seconds = 60;

/* 🔊 CALMER VOICE */
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.65;
    msg.pitch = 0.7;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
    countdown();
    breatheLoop();
}

/* ⏱ TIMER */
function countdown() {
    let interval = setInterval(() => {
        seconds--;
        timerEl.innerText = seconds;

        if (seconds <= 0) {
            clearInterval(interval);
            endSession();
        }
    }, 1000);
}

/* 🫁 BREATH LOOP */
async function breatheLoop() {
    while (running) {

        // INHALE
        label.innerText = "INHALE";
        speak("Inhale");
        fill.style.transition = "height 4s linear";
        fill.style.height = "100%";
        await sleep(4000);

        // EXHALE
        label.innerText = "EXHALE";
        speak("Exhale");
        fill.style.transition = "height 6s linear";
        fill.style.height = "0%";
        await sleep(6000);
    }
}

/* END */
function endSession() {
    running = false;
    label.innerText = "Try again";
    speak("Try again");

    let btn = document.createElement("button");
    btn.innerText = "Restart";
    btn.onclick = () => location.reload();

    document.getElementById("app").appendChild(btn);
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
