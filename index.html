<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drift Therapeutic</title>
<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Arial, sans-serif;
  color: white;
  background: linear-gradient(to top, #061018, #0b2a3a, #1aa3c7);
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#ui {
  z-index: 2;
  text-align: center;
}

#heart {
  width: 140px;
  height: 140px;
  margin: 20px auto;
  position: relative;
  transform: scale(1);
}

#heart:before,
#heart:after {
  content: "";
  position: absolute;
  width: 70px;
  height: 110px;
  background: #ff4d6d;
  border-radius: 70px 70px 0 0;
}

#heart:before {
  left: 70px;
  transform: rotate(-45deg);
}

#heart:after {
  left: 0;
  transform: rotate(45deg);
}

#fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: rgba(255,255,255,0.25);
  transition: height 1s;
}

button {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: #00e0ff;
  font-weight: bold;
  cursor: pointer;
}

#text {
  margin-top: 10px;
}
</style>
</head>
<body>

<canvas id="waves"></canvas>

<div id="ui">
  <div id="heart"><div id="fill"></div></div>
  <button onclick="start()">Start</button>
  <div id="text">Ready</div>
</div>

<script>
const canvas = document.getElementById("waves");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
window.onresize = resize;
resize();

let running = false;
let startTime;
let fill = 0;

function draw(t){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let base = canvas.height * 0.8;

  ctx.beginPath();
  for(let x=0;x<canvas.width;x++){
    let y = base + Math.sin(x*0.01 + t)*20;
    ctx.lineTo(x,y);
  }
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.stroke();
}

function start(){
  running = true;
  startTime = Date.now();
  fill = 0;
  loop();
}

function loop(){
  if(!running) return;

  let t = (Date.now() - startTime)/1000;

  draw(t);

  let breath = Math.sin(t*0.7);

  document.getElementById("heart").style.transform =
    `scale(${1 + breath*0.08})`;

  document.getElementById("text").innerText =
    breath > 0 ? "Inhale..." : "Exhale...";

  if(Math.floor(t/6) !== Math.floor((t-0.016)/6)){
    fill = Math.min(fill + 15, 100);
    document.getElementById("fill").style.height = fill + "%";
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
