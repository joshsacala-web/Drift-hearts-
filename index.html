<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breathing Drift Tool</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* Waves */
.wave {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 140px;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.25), transparent 70%);
  opacity: 0.4;
}

.wave1 { animation: drift 14s linear infinite; }
.wave2 { animation: drift 22s linear infinite reverse; opacity: 0.25; }
.wave3 { animation: drift 30s linear infinite; opacity: 0.15; }

@keyframes drift {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Clouds */
.cloud {
  position: absolute;
  top: 40px;
  width: 140px;
  height: 60px;
  background: white;
  border-radius: 50px;
  opacity: 0.6;
  filter: blur(1px);
}

.cloud1 { left: -200px; animation: cloudMove 70s linear infinite; }
.cloud2 { left: -400px; top: 90px; animation: cloudMove 100s linear infinite; }

@keyframes cloudMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(140vw); }
}
</style>

</head>

<body>

<div id="app"></div>

<script type="module">
import { useState, useEffect, useRef } from "https://esm.sh/react";
import { createRoot } from "https://esm.sh/react-dom/client";
import { motion } from "https://esm.sh/framer-motion";

function App() {
  const [phase, setPhase] = useState("inhale");
  const [breaths, setBreaths] = useState(0);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (!running) return;

    intervalRef.current = setInterval(() => {
      setPhase(p => (p === "inhale" ? "exhale" : "inhale"));
      setBreaths(b => (phase === "exhale" ? b + 1 : b));
    }, 4500);

    return () => clearInterval(intervalRef.current);
  }, [running, phase]);

  const heartFill = Math.min(breaths * 10, 100);

  return (
    React.createElement("div", {
      style: {
        width: "100vw",
        height: "100vh",
        position: "relative",
        overflow: "hidden",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        flexDirection: "column",
        background: "linear-gradient(to bottom, #38bdf8, #bae6fd, #fef3c7)"
      }
    },

      // Sun
      React.createElement("div", {
        style: {
          position: "absolute",
          top: 40,
          right: 40,
          width: 100,
          height: 100,
          borderRadius: "50%",
          background: "#fde047",
          filter: "blur(2px)",
          opacity: 0.9
        }
      }),

      // Clouds
      React.createElement("div", { className: "cloud cloud1" }),
      React.createElement("div", { className: "cloud cloud2" }),

      // Ocean
      React.createElement("div", {
        style: {
          position: "absolute",
          bottom: 0,
          width: "100%",
          height: "50%",
          background: "linear-gradient(to top, #1d4ed8, #3b82f6, #93c5fd)"
        }
      },
        React.createElement("div", { className: "wave wave1" }),
        React.createElement("div", { className: "wave wave2" }),
        React.createElement("div", { className: "wave wave3" })
      ),

      // Breathing core
      React.createElement("div", {
        style: {
          width: 180,
          height: 180,
          borderRadius: "50%",
          background: "rgba(59,130,246,0.3)",
          border: "4px solid white",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: 22,
          color: "white",
          transform: phase === "inhale" ? "scale(1.4)" : "scale(0.95)",
          transition: "all 4.5s ease-in-out"
        }
      }, phase.toUpperCase()),

      // Controls
      React.createElement("button", {
        onClick: () => setRunning(!running),
        style: {
          marginTop: 30,
          padding: "10px 20px",
          borderRadius: 999,
          background: "white"
        }
      }, running ? "Stop" : "Start"),

      React.createElement("div", {
        style: { marginTop: 10, color: "white" }
      }, `Breaths: ${breaths}`),

      React.createElement("div", {
        style: {
          position: "absolute",
          bottom: 80,
          width: 300,
          height: 10,
          background: "rgba(255,255,255,0.4)",
          borderRadius: 20,
          overflow: "hidden"
        }
      },
        React.createElement("div", {
          style: {
            width: heartFill + "%",
            height: "100%",
            background: "#ef4444",
            transition: "0.5s"
          }
        })
      )
    )
  );
}

createRoot(document.getElementById("app")).render(React.createElement(App));
</script>

</body>
</html>
