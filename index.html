<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, Arial;
    color: white;
}

/* 🌊 BACKGROUND */
.bg {
    position: fixed;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1501959915551-4e8d30928317") no-repeat center/cover;
    filter: brightness(0.7) blur(1px) saturate(0.9);
    transition: transform 8s ease;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* APP */
#app {
    position: absolute;
    top: 30%;
    width: 100%;
    text-align: center;
}

/* ❤️ HEART */
.heart {
    font-size: 110px;
    transition: transform 0.5s ease;
    filter: drop-shadow(0 0 18px rgba(255,80,80,0.5));
}

/* TEXT */
#label { font-size: 30px; }
#feedback { opacity: 0.8; margin-top: 6px; }
#timer { opacity: 0.5; }

/* START */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

button {
    margin-top:15px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    background:#ef4444;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<!-- 🌊 OCEAN SOUND -->
<audio id="ocean" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c2e5c7c9e.mp3">
</audio>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button onclick="start()">Start</button>
</div>

<div id="app">
    <div class="heart" id="heart">❤️</div>
    <div id="label">READY</div>
    <div id="feedback"></div>
    <div id="timer">60</div>
</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");
let feedback = document.getElementById("feedback");
let timerEl = document.getElementById("timer");
let bg = document.getElementById("bg");
let ocean = document.getElementById("ocean");

let ctx = new (window.AudioContext || window.webkitAudioContext)();
let tone = ctx.createOscillator();
let gain = ctx.createGain();

tone.type = "sine";
tone.frequency.value = 90;
gain.gain.value = 0;

tone.connect(gain);
gain.connect(ctx.destination);
tone.start();

let running = false;
let startTime;
let total = 60;

/* 🎧 VOICE */
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.65;
    msg.pitch = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* 📳 HAPTIC */
function pulse(strength=20) {
    if (navigator.vibrate) navigator.vibrate(strength);
}

function start() {
    document.getElementById("startScreen").style.display = "none";

    // start soundscape
    ocean.volume = 0;
    ocean.play().catch(()=>{});
    let fadeIn = setInterval(()=>{
        if (ocean.volume < 0.25) ocean.volume += 0.01;
        else clearInterval(fadeIn);
    }, 100);

    ctx.resume();
    gain.gain.linearRampToValueAtTime(0.015, ctx.currentTime + 2);

    running = true;
    startTime = performance.now();
    loop();
}

function loop() {
    if (!running) return;

    let now = performance.now();
    let elapsed = (now - startTime) / 1000;
    let remaining = Math.max(0, total - elapsed);

    timerEl.innerText = Math.ceil(remaining);

    if (remaining <= 0) {
        endSession();
        return;
    }

    let cycle = elapsed % 10;

    if (cycle < 4) {
        // INHALE
        let t = cycle / 4;

        label.innerText = "Inhale";
        heart.style.transform = `scale(${1 + t * 0.15})`;
        bg.style.transform = "scale(1.04) translateY(-8px)";

        if (Math.floor(cycle) === 0) {
            speak("Inhale");
            pulse(25);
        }

        feedback.innerText = "Slow breath in";

    } else {
        // EXHALE
        let t = (cycle - 4) / 6;

        label.innerText = "Exhale";
        heart.style.transform = `scale(${1.15 - t * 0.15})`;
        bg.style.transform = "scale(1) translateY(8px)";

        if (Math.floor(cycle) === 4) {
            speak("Exhale");
            pulse([10,30,10]);
        }

        feedback.innerText = "Let your body soften";
    }

    requestAnimationFrame(loop);
}

function endSession() {
    running = false;

    let msg = "This is here when you need it.";

    label.innerText = msg;
    feedback.innerText = "";
    timerEl.innerText = "";

    speak(msg);

    // fade audio out
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);

    let fadeOut = setInterval(()=>{
        if (ocean.volume > 0.02) ocean.volume -= 0.01;
        else {
            ocean.pause();
            clearInterval(fadeOut);
        }
    }, 100);

    let btn = document.createElement("button");
    btn.innerText = "Retry";
    btn.style.position = "absolute";
    btn.style.bottom = "20%";
    btn.style.left = "50%";
    btn.style.transform = "translateX(-50%)";

    btn.onclick = () => location.reload();

    document.body.appendChild(btn);
}

</script>

</body>
</html>
