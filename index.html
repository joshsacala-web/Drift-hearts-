<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
 margin:0;
 overflow:hidden;
 background:linear-gradient(#6ec6ff, #eaf7ff);
}
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<div id="ui">Tap to Start</div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let gameStarted = false;
let playing = true;
let score = 0;

// player
let p = {
 x: 100,
 y: c.height/2,
 vy: 0
};

// pipes
let pipes = [];
let spawnTimer = 0;

// INPUT
function flap(){
 if(!gameStarted){
   gameStarted = true;
   return;
 }
 if(!playing){
   location.reload();
   return;
 }
 p.vy = -7;
}

document.addEventListener("mousedown", flap);
document.addEventListener("touchstart", flap);

// LOOP
function loop(){

 ctx.clearRect(0,0,c.width,c.height);

 // spawn pipes (simple + stable)
 if(gameStarted){
   spawnTimer--;
   if(spawnTimer <= 0){
     let gap = 180;
     let top = Math.random()*(c.height-300);

     pipes.push({
       x: c.width,
       top,
       bottom: top + gap,
       passed:false
     });

     spawnTimer = 120; // consistent spacing
   }
 }

 // draw pipes
 pipes.forEach(pipe=>{
   pipe.x -= 3;

   ctx.fillStyle = "#ff4d6d";

   ctx.fillRect(pipe.x, 0, 60, pipe.top);
   ctx.fillRect(pipe.x, pipe.bottom, 60, c.height);

   // score
   if(!pipe.passed && pipe.x < p.x){
     score++;
     pipe.passed = true;
   }

   // collision
   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(p=>p.x > -60);

 // physics
 if(gameStarted){
   p.vy += 0.5;
   if(p.vy > 8) p.vy = 8;
   p.y += p.vy;
 }

 if(p.y < 0) p.y = 0;
 if(p.y > c.height) playing = false;

 // player
 ctx.font = "40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);

 // UI
 if(!gameStarted){
   document.getElementById("ui").innerText = "Tap to Start";
 } else if(playing){
   document.getElementById("ui").innerText = "Score: " + score;
 } else {
   document.getElementById("ui").innerText = "Game Over — " + score + " (tap)";
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
