<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #020617, #000);
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#app { text-align: center; }

/* HEART */
.heart {
    width: 170px;
    height: 170px;
    margin: auto;
    transform: scale(1);
    transition: transform linear;
    filter: drop-shadow(0 0 25px rgba(255,80,80,0.6));
}

.heart svg {
    width: 100%;
    height: 100%;
}

/* GLOW */
@keyframes glow {
    0% { filter: drop-shadow(0 0 10px rgba(255,80,80,0.3)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,80,80,0.9)); }
    100% { filter: drop-shadow(0 0 10px rgba(255,80,80,0.3)); }
}

.glow {
    animation: glow 4s ease-in-out infinite;
}

#label {
    margin-top: 40px;
    font-size: 32px;
    letter-spacing: 3px;
}

#overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

button {
    margin-top: 15px;
    padding: 14px 28px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

#startBtn { background: #ef4444; color: white; }
#soundBtn { background: #334155; color: white; }

</style>
</head>

<body>

<div id="overlay">
    <h1>Calm Your Heart</h1>
    <p>Follow the rhythm</p>
    <button id="startBtn" onclick="start()">Start</button>
    <button id="soundBtn" onclick="toggleSound()">Sound: ON</button>
</div>

<div id="app">
    <div class="heart glow" id="heart">
        <svg viewBox="0 0 24 24" fill="#ff4d4d">
            <path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3C9.5 3 12 5 12 5s2.5-2 4.5-2C21 3 21 8 21 12.5S12 21 12 21z"/>
        </svg>
    </div>
    <div id="label">READY</div>
</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");

let running = false;
let soundOn = true;

/* 🎧 AUDIO ENGINE (no files needed) */
let audioCtx;
let gainNode;

function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    let oscillator = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = 110; // deep calming tone

    gainNode.gain.value = 0.02; // very soft

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
}

/* 🔊 VOICE */
function speak(text) {
    if (!soundOn) return;

    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.85;
    msg.pitch = 0.9;
    msg.volume = 0.8;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

function toggleSound() {
    soundOn = !soundOn;
    document.getElementById("soundBtn").innerText =
        "Sound: " + (soundOn ? "ON" : "OFF");

    if (gainNode) {
        gainNode.gain.value = soundOn ? 0.02 : 0;
    }
}

function start() {
    document.getElementById("overlay").style.display = "none";
    running = true;

    initAudio(); // start ambient tone
    breatheLoop();
}

async function breatheLoop() {
    while (running) {

        // INHALE
        label.innerText = "INHALE";
        speak("Inhale");
        heart.style.transition = "transform 4s ease-in-out";
        heart.style.transform = "scale(1.5)";
        await sleep(4000);

        // HOLD
        label.innerText = "HOLD";
        await sleep(800);

        // EXHALE
        label.innerText = "EXHALE";
        speak("Exhale");
        heart.style.transition = "transform 6s ease-in-out";
        heart.style.transform = "scale(1)";
        await sleep(6000);

        label.innerText = "";
        await sleep(500);
    }
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
