<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block}
#start{
 position:fixed;inset:0;
 display:flex;align-items:center;justify-content:center;
 background:#000;color:#fff;font-size:24px;
 z-index:10
}
</style>
</head>
<body>

<div id="start">Tap to Start</div>
<canvas id="c"></canvas>

<audio id="ocean" loop preload="auto">
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3">
</audio>

<script>
const c=document.getElementById("c"),ctx=c.getContext("2d");

function resize(){
 c.width=innerWidth;
 c.height=innerHeight;
 joy.baseX=c.width/2;
 joy.baseY=c.height*0.85;
}
resize();addEventListener("resize",resize);

// STATE
let started=false,gameOver=false;
let score=0,high=0,time=0;
let speed=2,level=1;

// PLAYER (tighter feel)
let p={x:150,y:c.height/2,vx:0,vy:0};

// FIXED JOYSTICK
let joy={x:0,y:0,baseX:c.width/2,baseY:c.height*0.85,active:false};

// ENTITIES
let birds=[];

// START
function startGame(){
 if(started)return;
 started=true;
 document.getElementById("start").style.display="none";

 let a=document.getElementById("ocean");
 a.play().catch(()=>{});
}

// INPUT (joystick stays fixed)
addEventListener("touchstart",e=>{
 startGame();
 joy.active=true;
},{passive:false});

addEventListener("touchmove",e=>{
 if(!joy.active)return;
 let t=e.touches[0];

 joy.x=t.clientX-joy.baseX;
 joy.y=t.clientY-joy.baseY;

 let max=50;
 joy.x=Math.max(-max,Math.min(max,joy.x));
 joy.y=Math.max(-max,Math.min(max,joy.y));
},{passive:false});

addEventListener("touchend",()=>{
 joy.active=false;
 joy.x=0;joy.y=0;
});

// DRAW
function drawScene(){

 time+=0.01;

 // SKY
 let g=ctx.createLinearGradient(0,0,0,c.height);
 g.addColorStop(0,"#4fc3f7");
 g.addColorStop(1,"#ffe0b2");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);

 // SUN
 ctx.beginPath();
 ctx.arc(c.width*0.8,c.height*0.2,60,0,Math.PI*2);
 ctx.fillStyle="rgba(255,230,150,0.9)";
 ctx.fill();

 // OCEAN
 ctx.fillStyle="#2ec4f0";
 ctx.fillRect(0,c.height*0.55,c.width,c.height);

 // WAVES
 ctx.strokeStyle="rgba(255,255,255,0.5)";
 for(let l=0;l<3;l++){
   ctx.beginPath();
   for(let x=0;x<c.width;x+=10){
     let y=c.height*0.55+
       Math.sin(x*0.02+time*(2+l))*(6+l*3);
     ctx.lineTo(x,y);
   }
   ctx.stroke();
 }

 // SAND
 ctx.fillStyle="#f4d9a5";
 ctx.fillRect(0,c.height*0.8,c.width,c.height);
}

// LOOP
function loop(){

 drawScene();

 if(started && !gameOver){

   // TIGHT CONTROL (no floaty feel)
   p.vx = joy.x * 0.08;
   p.vy = joy.y * 0.08;

   p.x += p.vx;
   p.y += p.vy;

   p.x=Math.max(0,Math.min(c.width,p.x));
   p.y=Math.max(0,Math.min(c.height,p.y));

   // LEVEL RAMP
   if(Math.floor(time/30)+1>level){
     level++;
     speed+=0.4;
   }

   // SPAWN BIRDS (better spacing)
   if(Math.random()<0.02){
     birds.push({
       x:c.width,
       y:Math.random()*c.height*0.6,
       offset:Math.random()*10
     });
   }

   // BIRDS
   birds.forEach(b=>{
     b.x-=speed;
     b.y+=Math.sin(time+b.offset)*1.2;

     ctx.fillStyle="#111";
     ctx.fillRect(b.x,b.y,24,10);
     ctx.fillRect(b.x+6,b.y-6,10,6);

     if(Math.abs(p.x-b.x)<22 && Math.abs(p.y-b.y)<22){
       gameOver=true;
       high=Math.max(high,score);
     }
   });

   birds=birds.filter(b=>b.x>-50);

   score++;
 }

 // PLAYER
 ctx.font="40px sans-serif";
 ctx.fillText("❤️",p.x-20,p.y+10);

 // JOYSTICK (fixed bottom center)
 ctx.beginPath();
 ctx.arc(joy.baseX,joy.baseY,45,0,Math.PI*2);
 ctx.strokeStyle="white";
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(joy.baseX+joy.x,joy.baseY+joy.y,20,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.fill();

 // UI
 ctx.fillStyle="white";
 ctx.fillText("Score "+score,20,40);
 ctx.fillText("Best "+high,20,70);

 if(gameOver){
   ctx.fillText("GAME OVER",c.width/2-100,c.height/2);
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
