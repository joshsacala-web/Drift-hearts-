<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 5px black;
}
#start{
 position:fixed;
 width:100%; height:100%;
 background:rgba(0,0,0,0.6);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:white;
 font-family:sans-serif;
}
button{ padding:10px 20px; font-size:18px; }
</style>
</head>
<body>

<div id="ui">Score: 0</div>

<div id="start">
 <h2>❤️ Flappy Beach</h2>
 <p>Tap to fly through waves</p>
 <button onclick="startGame()">Start</button>
</div>

<canvas id="c"></canvas>

<audio id="music" loop src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b1f6c.mp3"></audio>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let playing = false;
let score = 0;

// player
let p = {
 x: 120,
 y: c.height/2,
 vy: 0
};

// pipes (waves)
let pipes = [];
let spawn = 0;

// start
function startGame(){
 document.getElementById("start").style.display="none";
 playing = true;
 document.getElementById("music").play();
}

// input
function flap(){
 if(!playing) return;
 p.vy = -8;
}
document.addEventListener("mousedown", flap);
document.addEventListener("touchstart", flap);

// loop
function loop(){

 // sky
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#6ec6ff");
 sky.addColorStop(1,"#ffe0b3");
 ctx.fillStyle=sky;
 ctx.fillRect(0,0,c.width,c.height);

 // ocean
 ctx.fillStyle="#3aa6d6";
 ctx.fillRect(0,c.height*0.6,c.width,c.height);

 // spawn waves
 if(playing){
   spawn--;
   if(spawn<=0){
     let gap = 140;
     let top = Math.random()*(c.height*0.4);

     pipes.push({
       x:c.width,
       top:top,
       bottom:top+gap,
       scored:false
     });

     spawn = 90;
   }
 }

 // draw pipes (waves)
 pipes.forEach(pipe=>{
   pipe.x -= 3;

   // top wave
   ctx.fillStyle="white";
   ctx.fillRect(pipe.x, 0, 60, pipe.top);

   // bottom wave
   ctx.fillRect(pipe.x, pipe.bottom, 60, c.height);

   // score
   if(!pipe.scored && pipe.x < p.x){
     score++;
     pipe.scored = true;
   }

   // collision
   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(pipe=>pipe.x > -60);

 // physics
 p.vy += 0.4;
 p.y += p.vy;

 // ground/ceiling
 if(p.y > c.height || p.y < 0){
   playing = false;
 }

 // player
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);

 // UI
 document.getElementById("ui").innerText =
   playing ? "Score: " + score : "Game Over — " + score + " (tap to restart)";

 // restart
 if(!playing){
   document.addEventListener("click", ()=>{
     location.reload();
   }, {once:true});
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
