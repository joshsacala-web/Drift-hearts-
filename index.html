<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart – Guided Breathing</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, Arial, sans-serif;
    color: white;
}

/* 🌅 BACKGROUND (reliable) */
.bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(to top, #020617, #0a1a2f 40%, #1e3a8a 70%, #f97316);
    filter: brightness(0.85);
}

/* 🌊 OCEAN */
.ocean {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 45%;
    background: linear-gradient(to top, rgba(0,100,200,0.5), transparent);
}

/* APP */
#app {
    position: absolute;
    top: 26%;
    width: 100%;
    text-align: center;
}

/* ❤️ HEART */
.heart {
    width: 160px;
    height: 160px;
    margin: auto;
    position: relative;
}

.fill {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #ff4d4d, #ff9999);
    border-radius: 50% 50% 0 0;
}

/* outline */
svg { position: absolute; inset: 0; }

/* TEXT */
#label { margin-top: 20px; font-size: 26px; letter-spacing: 1px; }
#timer { margin-top: 6px; font-size: 18px; opacity: 0.7; }

/* CONTROLS */
.controls {
    margin-top: 15px;
}
button {
    margin: 5px;
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
}
.primary { background: #ef4444; color: white; }
.secondary { background: #334155; color: white; }

/* START */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
.note {
    max-width: 320px;
    font-size: 13px;
    opacity: 0.7;
    margin-top: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="ocean"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <p>Slow breathing can help reduce symptoms</p>
    <button class="primary" onclick="start()">Start</button>
    <div class="note">
        This tool supports relaxation. It is not a medical device.
        If you have severe symptoms, seek medical care.
    </div>
</div>

<div id="app">
    <div class="heart">
        <div class="fill" id="fill"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 21s-6-4.35-9-8.5S3 3 7.5 3C9.5 3 12 5 12 5s2.5-2 4.5-2C21 3 21 8 21 12.5S12 21 12 21z"/>
        </svg>
    </div>

    <div id="label">READY</div>
    <div id="timer">60</div>

    <div class="controls">
        <button class="secondary" onclick="pause()">Pause</button>
        <button class="secondary" onclick="resume()">Resume</button>
        <button class="secondary" onclick="stop()">Stop</button>
    </div>
</div>

<script>

let fill = document.getElementById("fill");
let label = document.getElementById("label");
let timerEl = document.getElementById("timer");

let running = false;
let paused = false;
let startTime = 0;
let pauseTime = 0;
let total = 60;

/* 🔊 SOFT TONE */
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
let gain = ctx.createGain();
osc.frequency.value = 110;
gain.gain.value = 0;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();

/* 📳 HAPTICS */
function vibrate(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
    paused = false;
    startTime = performance.now();

    gain.gain.linearRampToValueAtTime(0.02, ctx.currentTime + 2);

    loop();
}

function pause() {
    if (!running) return;
    paused = true;
    pauseTime = performance.now();
}

function resume() {
    if (!paused) return;
    paused = false;
    let now = performance.now();
    startTime += (now - pauseTime);
    loop();
}

function stop() {
    running = false;
    label.innerText = "Stopped";
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
}

/* 🫁 MAIN LOOP */
function loop() {
    if (!running || paused) return;

    let now = performance.now();
    let elapsed = (now - startTime) / 1000;
    let remaining = Math.max(0, total - elapsed);

    timerEl.innerText = Math.ceil(remaining);

    if (remaining <= 0) {
        endSession();
        return;
    }

    // 4s inhale / 6s exhale
    let cycle = elapsed % 10;

    if (cycle < 4) {
        label.innerText = "Inhale";
        fill.style.height = (cycle / 4) * 100 + "%";
        vibrate(10);
    } else {
        label.innerText = "Exhale";
        let t = (cycle - 4) / 6;
        fill.style.height = (1 - t) * 100 + "%";
        vibrate([5,20,5]);
    }

    requestAnimationFrame(loop);
}

function endSession() {
    running = false;

    label.innerText = "Session complete";
    timerEl.innerText = "";

    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 2);

    let btn = document.createElement("button");
    btn.className = "primary";
    btn.innerText = "Try again";
    btn.onclick = () => location.reload();

    document.getElementById("app").appendChild(btn);
}

</script>

</body>
</html>
