<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 5px black;
 font-size:20px;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let score = 0;
let playing = true;

// player
let player = {
 x: 100,
 y: c.height*0.65,
 vy: 0,
 grounded: true
};

// waves
let waves = [];
let spawnTimer = 0;

// input
document.addEventListener("keydown", e=>{
 if(e.code === "Space" || e.code === "ArrowUp") jump();
});
document.addEventListener("touchstart", jump);

function jump(){
 if(!playing) {
   restart();
   return;
 }
 if(player.grounded){
   player.vy = -14;
   player.grounded = false;
 }
}

// restart
function restart(){
 score = 0;
 waves = [];
 playing = true;
}

// game loop
function loop(){

 // SKY
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#7ec8ff");
 sky.addColorStop(1,"#ffd2a6");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // OCEAN (left side)
 ctx.fillStyle="#3aa6d6";
 ctx.fillRect(0,c.height*0.6,c.width,c.height);

 // SAND
 ctx.fillStyle="#f4d9a0";
 ctx.fillRect(0,c.height*0.65,c.width,c.height);

 // palm trees (simple)
 ctx.fillStyle="#8b5a2b";
 ctx.fillRect(300, c.height*0.55, 10, 80);
 ctx.beginPath();
 ctx.arc(305, c.height*0.55, 25, 0, Math.PI*2);
 ctx.fillStyle="green";
 ctx.fill();

 // spawn waves
 if(playing){
   spawnTimer--;
   if(spawnTimer <= 0){
     waves.push({
       x: c.width,
       width: 60 + Math.random()*40
     });
     spawnTimer = 80 + Math.random()*60;
   }
 }

 // waves
 waves.forEach(w=>{
   w.x -= 6;

   // wave shape
   ctx.beginPath();
   ctx.moveTo(w.x, c.height*0.65);
   ctx.quadraticCurveTo(
     w.x + w.width/2,
     c.height*0.65 - 30,
     w.x + w.width,
     c.height*0.65
   );
   ctx.fillStyle="white";
   ctx.fill();

   // collision
   if(
     player.x + 20 > w.x &&
     player.x - 20 < w.x + w.width &&
     player.y >= c.height*0.63
   ){
     playing = false;
   }
 });

 // remove old waves
 waves = waves.filter(w => w.x + w.width > 0);

 // physics
 player.vy += 0.8;
 player.y += player.vy;

 if(player.y >= c.height*0.65){
   player.y = c.height*0.65;
   player.vy = 0;
   player.grounded = true;
 }

 // player
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", player.x-15, player.y);

 // score
 if(playing){
   score += 0.05;
 }

 document.getElementById("ui").innerText =
   playing ? "Score: " + Math.floor(score)
           : "Game Over — Score: " + Math.floor(score) + " (tap to restart)";

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
