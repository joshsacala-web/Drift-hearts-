<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saxson 2 HD</title><style>
body{
 margin:0;
 background:#0a0a0f;
 font-family:sans-serif;
 color:#fff;
 overflow:hidden;
}

#game{
 width:100vw;
 height:100vh;
 display:flex;
 flex-direction:column;
 align-items:center;
 justify-content:center;
}

#reels{
 display:flex;
 gap:10px;
 background:#111;
 padding:15px;
 border:4px solid gold;
 border-radius:12px;
 box-shadow:0 0 40px rgba(255,215,0,0.4);
 overflow:hidden;
}

.reel{
 width:90px;
 height:270px;
 overflow:hidden;
 position:relative;
 background:#000;
 border-radius:6px;
}

.strip{
 position:absolute;
 width:100%;
}

.symbol{
 width:90px;
 height:90px;
 display:flex;
 align-items:center;
 justify-content:center;
}

.symbol img{
 width:80px;
 height:80px;
 object-fit:contain;
}

.blur{
 filter:blur(3px);
}

#ui{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:12px;
 background:#000;
 border-top:2px solid gold;
}

button{
 background:gold;
 border:none;
 padding:12px 20px;
 font-size:18px;
 font-weight:bold;
}
</style></head><body><div id="game"><div id="reels"></div><div id="ui">
<div>💰 $<span id="bal">100.00</span></div>
<div>🎁 <span id="fs">0</span></div>
<div>✖️ x<span id="mult">1</span></div>
<button onclick="spin()">SPIN</button>
</div></div><script>

// HD SYMBOL IMAGES
const symbols = {
 A:"https://i.imgur.com/8Qf6R8R.png",
 K:"https://i.imgur.com/Y3X9Q9k.png",
 Q:"https://i.imgur.com/3ZQ3Z3C.png",
 J:"https://i.imgur.com/qK42fUu.png",
 W:"https://i.imgur.com/5bZ6F9D.png", // skull wild
 S1:"https://i.imgur.com/eVQZ8ZP.png", // singer
 S2:"https://i.imgur.com/L1mY3bY.png"  // motorcycle
};

const reelData = [
 ["A","K","Q","J","W","A","K"],
 ["K","Q","S1","J","A","K"],
 ["Q","A","K","J","W"],
 ["A","K","S2","J","Q"],
 ["K","Q","A","J","W"]
];

let balance=100, bet=0.5;
let fs=0, mult=1, inBonus=false;

const reelsDiv=document.getElementById("reels");

// CREATE REELS
function createReels(){
 reelsDiv.innerHTML="";
 reelData.forEach((r,i)=>{
  const reel=document.createElement("div");
  reel.className="reel";

  const strip=document.createElement("div");
  strip.className="strip";

  for(let j=0;j<20;j++){
   let sym=r[Math.floor(Math.random()*r.length)];
   let div=document.createElement("div");
   div.className="symbol";
   div.innerHTML=`<img src="${symbols[sym]}">`;
   strip.appendChild(div);
  }

  reel.appendChild(strip);
  reelsDiv.appendChild(reel);
 });
}

createReels();

// SPIN
function spin(){
 if(fs<=0 && balance<bet) return;

 if(fs>0) fs--;
 else balance-=bet;

 document.querySelectorAll(".strip").forEach((strip,i)=>{
   strip.classList.add("blur");

   let stop=500 + i*200;

   strip.style.transition=`transform ${1+i*0.2}s cubic-bezier(.2,.8,.2,1)`;

   let offset=-(Math.floor(Math.random()*15)+5)*90;

   setTimeout(()=>{
     strip.style.transform=`translateY(${offset}px)`;
   },50);

   setTimeout(()=>{
     strip.classList.remove("blur");
     if(i===4) endSpin();
   },stop);
 });
}

// END SPIN
function endSpin(){

 // SIMPLE BONUS TRIGGER
 let trigger=Math.random();

 if(!inBonus && trigger<0.15){
   inBonus=true;
   fs=10+Math.floor(Math.random()*10);
   mult=1;
 }

 if(inBonus){
   mult++;
   if(fs<=0){
     inBonus=false;
     mult=1;
   }
 }

 balance += Math.random()*2;

 updateUI();
}

// UI
function updateUI(){
 bal.innerText=balance.toFixed(2);
 fs.innerText=fs;
 mult.innerText=mult;
}

</script></body>
</html>
