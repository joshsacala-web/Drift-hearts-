<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin:0; overflow:hidden; background:#87ceeb; }
canvas { display:block; }
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 8px black;
}
</style>
</head>
<body>

<div id="ui">Score: 0</div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");
c.width = innerWidth;
c.height = innerHeight;

let playing = true;
let score = 0;
let combo = 0;

// player
let p = { x:120, y:c.height/2, vy:0 };

// waves
let waves = [];
let spawn = 0;

// hearts
let items = [];

// particles
let particles = [];

// input
document.addEventListener("mousedown", flap);
document.addEventListener("touchstart", flap);

function flap(){
 if(!playing) return location.reload();
 p.vy = -8;
}

// particle burst
function burst(x,y,color){
 for(let i=0;i<10;i++){
   particles.push({
     x,y,
     vx:(Math.random()-0.5)*4,
     vy:(Math.random()-0.5)*4,
     life:30,
     color
   });
 }
}

// loop
function loop(){

 // SKY
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#6ec6ff");
 sky.addColorStop(1,"#ffe0b3");
 ctx.fillStyle=sky;
 ctx.fillRect(0,0,c.width,c.height);

 // OCEAN
 ctx.fillStyle="#3aa6d6";
 ctx.fillRect(0,c.height*0.6,c.width,c.height);

 // spawn waves
 spawn--;
 if(spawn<=0){
   let gap = 140;
   let top = Math.random()*(c.height*0.4);
   waves.push({ x:c.width, top, bottom:top+gap });
   spawn = 80;
 }

 // spawn hearts
 if(Math.random()<0.03){
   items.push({ x:c.width, y:Math.random()*c.height*0.6 });
 }

 // draw waves (animated)
 waves.forEach(w=>{
   w.x -= 3;

   let t = Date.now()*0.002;

   ctx.beginPath();
   ctx.moveTo(w.x,0);
   ctx.lineTo(w.x+60,0);
   ctx.quadraticCurveTo(w.x+30, w.top-30+Math.sin(t)*5, w.x, w.top);
   ctx.fillStyle="white";
   ctx.fill();

   ctx.beginPath();
   ctx.moveTo(w.x,c.height);
   ctx.lineTo(w.x+60,c.height);
   ctx.quadraticCurveTo(w.x+30, w.bottom+30+Math.sin(t)*5, w.x, w.bottom);
   ctx.fill();

   if(p.x>w.x && p.x<w.x+60 && (p.y<w.top || p.y>w.bottom)){
     playing=false;
     burst(p.x,p.y,"red");
   }
 });

 waves = waves.filter(w=>w.x>-60);

 // draw hearts
 items.forEach(i=>{
   i.x -= 3;

   ctx.shadowBlur = 15;
   ctx.shadowColor = "pink";
   ctx.font="22px sans-serif";
   ctx.fillText("💖", i.x, i.y);
   ctx.shadowBlur = 0;

   if(Math.abs(i.x-p.x)<20 && Math.abs(i.y-p.y)<20){
     combo++;
     score += 5 * combo;
     i.collected = true;
     burst(i.x,i.y,"pink");
   }
 });

 items = items.filter(i=>!i.collected && i.x>-20);

 // physics
 p.vy += 0.4;
 p.y += p.vy;

 if(p.y<0 || p.y>c.height){
   playing=false;
   combo = 0;
 }

 // player glow
 ctx.shadowBlur = 15;
 ctx.shadowColor = "red";
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // particles
 particles.forEach(pt=>{
   pt.x += pt.vx;
   pt.y += pt.vy;
   pt.life--;

   ctx.fillStyle = pt.color;
   ctx.fillRect(pt.x, pt.y, 3, 3);
 });

 particles = particles.filter(p=>p.life>0);

 // score + combo UI
 document.getElementById("ui").innerText =
   playing
   ? "Score: "+Math.floor(score)+" | Combo: "+combo
   : "Game Over — "+Math.floor(score)+" (tap)";

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
