<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
html,body{
 margin:0;
 overflow:hidden;
 background:#87ceeb;
 touch-action:none;
}
canvas{display:block;}
#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 5px black;
}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c"></canvas>

<script>
let c = document.getElementById("c");
let ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let p = {x:120,y:c.height/2,vy:0};
let pipes = [];
let score = 0;
let playing = true;

let lastSpawnX = c.width; // 🔥 controls spacing

// INPUT
function flap(e){
 e.preventDefault();
 if(!playing) return location.reload();
 p.vy = -6.5;
}
document.addEventListener("touchstart", flap, {passive:false});
document.addEventListener("mousedown", flap);

// LOOP
function loop(){

 ctx.fillStyle="#7ec8ff";
 ctx.fillRect(0,0,c.width,c.height);

 // 🔥 SPAWN FIX (distance based, NOT time)
 if(lastSpawnX < c.width - 260){
   let gap = 180;
   let top = Math.random()*(c.height-300);

   pipes.push({
     x:c.width,
     top,
     bottom:top+gap,
     passed:false
   });

   lastSpawnX = c.width;
 }

 // DRAW PIPES
 pipes.forEach(pipe=>{
   pipe.x -= 2.8;
   lastSpawnX = pipe.x;

   ctx.fillStyle="#ff5a76";

   // top
   ctx.fillRect(pipe.x,0,60,pipe.top);

   // bottom
   ctx.fillRect(pipe.x,pipe.bottom,60,c.height);

   // score
   if(!pipe.passed && pipe.x < p.x){
     score++;
     pipe.passed = true;
   }

   // collision
   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(p=>p.x > -60);

 // PHYSICS
 p.vy += 0.45;
 if(p.vy > 7) p.vy = 7;
 p.y += p.vy;

 if(p.y < 0) p.y = 0;
 if(p.y > c.height) playing = false;

 // PLAYER
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);

 // UI
 document.getElementById("ui").innerText =
   playing ? "Score: "+score
           : "Game Over — "+score+" (tap)";

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
