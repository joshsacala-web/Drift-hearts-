<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block}
#start{
 position:fixed;inset:0;
 display:flex;align-items:center;justify-content:center;
 background:#000;color:#fff;font-size:24px;
 z-index:10;
}
</style>
</head>
<body>

<div id="start">Tap to Start</div>
<canvas id="c"></canvas>

<audio id="ocean" loop playsinline>
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3">
</audio>

<script>
const c=document.getElementById("c"),ctx=c.getContext("2d");

function resize(){
 c.width=innerWidth;
 c.height=innerHeight;
 joy.baseX=c.width/2;
 joy.baseY=c.height*0.85;
}
resize();
addEventListener("resize",resize);

let started=false,gameOver=false;
let score=0,time=0;

// PLAYER
let p={x:150,y:c.height/2};

// JOYSTICK
let joy={x:0,y:0,baseX:c.width/2,baseY:c.height*0.85,active:false};

// BIRDS
let birds=[];

// 🔥 FORCE START (works everywhere)
function forceStart(){
 if(started) return;

 started=true;
 document.getElementById("start").style.display="none";

 const a=document.getElementById("ocean");
 a.play().catch(()=>{});

 joy.active=true;
}

// 🔥 ALL INPUT TYPES (nothing can fail now)
["click","touchstart","pointerdown","mousedown"].forEach(evt=>{
 document.addEventListener(evt, e=>{
   e.preventDefault();
   forceStart();
 },{passive:false});
});

// MOVE
addEventListener("touchmove",e=>{
 if(!joy.active)return;
 let t=e.touches[0];

 joy.x=t.clientX-joy.baseX;
 joy.y=t.clientY-joy.baseY;

 let m=50;
 joy.x=Math.max(-m,Math.min(m,joy.x));
 joy.y=Math.max(-m,Math.min(m,joy.y));
},{passive:false});

addEventListener("touchend",()=>{
 joy.active=false;
 joy.x=0;joy.y=0;
});

// DRAW
function draw(){
 time+=0.01;

 // SKY
 let g=ctx.createLinearGradient(0,0,0,c.height);
 g.addColorStop(0,"#5ec8ff");
 g.addColorStop(1,"#ffd6a5");
 ctx.fillStyle=g;
 ctx.fillRect(0,0,c.width,c.height);

 // SUN
 ctx.beginPath();
 ctx.arc(c.width*0.8,c.height*0.2,60,0,Math.PI*2);
 ctx.fillStyle="rgba(255,230,150,0.9)";
 ctx.fill();

 // OCEAN
 ctx.fillStyle="#1fb6ff";
 ctx.fillRect(0,c.height*0.55,c.width,c.height);

 // WAVES
 ctx.strokeStyle="rgba(255,255,255,0.4)";
 for(let l=0;l<3;l++){
   ctx.beginPath();
   for(let x=0;x<c.width;x+=8){
     let y=c.height*0.55+
       Math.sin(x*0.02+time*(2+l))*5;
     ctx.lineTo(x,y);
   }
   ctx.stroke();
 }

 // SAND
 ctx.fillStyle="#f5deb3";
 ctx.fillRect(0,c.height*0.8,c.width,c.height);
}

// LOOP
function loop(){

 draw();

 if(started && !gameOver){

   p.x += joy.x*0.08;
   p.y += joy.y*0.08;

   p.x=Math.max(0,Math.min(c.width,p.x));
   p.y=Math.max(0,Math.min(c.height,p.y));

   if(Math.random()<0.02){
     birds.push({
       x:c.width,
       y:Math.random()*c.height*0.6
     });
   }

   birds.forEach(b=>{
     b.x-=3;

     ctx.fillStyle="#222";
     ctx.fillRect(b.x,b.y,20,10);

     if(Math.abs(p.x-b.x)<20 && Math.abs(p.y-b.y)<20){
       gameOver=true;
     }
   });

   birds=birds.filter(b=>b.x>-50);

   score++;
 }

 // PLAYER
 ctx.font="40px sans-serif";
 ctx.fillText("❤️",p.x-20,p.y+10);

 // JOYSTICK
 ctx.beginPath();
 ctx.arc(joy.baseX,joy.baseY,45,0,Math.PI*2);
 ctx.strokeStyle="white";
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(joy.baseX+joy.x,joy.baseY+joy.y,20,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.fill();

 // UI
 ctx.fillStyle="white";
 ctx.fillText("Score "+score,20,40);

 if(gameOver){
   ctx.fillText("GAME OVER",c.width/2-100,c.height/2);
 }

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
