<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beach Game</title>

<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
#start{
 position:fixed;inset:0;
 display:flex;align-items:center;justify-content:center;
 background:black;color:white;font-size:24px;
 font-family:sans-serif;
}
</style>
</head>

<body>

<div id="start">Tap to Start</div>
<canvas id="c"></canvas>

<audio id="ocean" loop preload="auto" playsinline>
<source src="https://cdn.pixabay.com/audio/2022/03/10/audio_115b9b1f6c.mp3" type="audio/mpeg">
</audio>

<script>
window.onload = function(){

const c=document.getElementById("c");
const ctx=c.getContext("2d");

function resize(){
 c.width=window.innerWidth;
 c.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// STATE
let started=false, gameOver=false;
let score=0, speed=2, time=0;

// PLAYER
let p={x:150,y:c.height/2,vx:0,vy:0,angle:0};

// JOYSTICK
let joy={x:0,y:0,active:false,baseX:c.width/2,baseY:c.height*0.85};

// ENTITIES
let birds=[], hearts=[], particles=[];

// AUDIO
function startGame(){
 if(started) return;

 let audio=document.getElementById("ocean");

 audio.play().then(()=>{
   audio.volume=0.5;
   started=true;
   document.getElementById("start").style.display="none";
 }).catch(()=>{
   document.getElementById("start").innerText="Tap again";
 });
}

// INPUT
document.addEventListener("touchstart",e=>{
 startGame();
 joy.active=true;
},{passive:false});

document.addEventListener("touchmove",e=>{
 if(!joy.active)return;
 let t=e.touches[0];

 joy.x=t.clientX-joy.baseX;
 joy.y=t.clientY-joy.baseY;

 let max=40;
 joy.x=Math.max(-max,Math.min(max,joy.x));
 joy.y=Math.max(-max,Math.min(max,joy.y));

 p.vx=joy.x*0.05;
 p.vy=joy.y*0.05;
},{passive:false});

document.addEventListener("touchend",()=>{
 joy.active=false;
 joy.x=0; joy.y=0;
});

// DRAW
function drawScene(){

 time+=0.01;

 let sky=ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#4fc3f7");
 sky.addColorStop(1,"#ffe0b2");
 ctx.fillStyle=sky;
 ctx.fillRect(0,0,c.width,c.height);

 ctx.beginPath();
 ctx.arc(c.width*0.75,c.height*0.25,60,0,Math.PI*2);
 ctx.fillStyle="rgba(255,255,200,0.9)";
 ctx.fill();

 ctx.fillStyle="#2ec4f0";
 ctx.fillRect(0,c.height*0.55,c.width,c.height*0.25);

 ctx.strokeStyle="rgba(255,255,255,0.6)";
 for(let layer=0;layer<3;layer++){
   ctx.beginPath();
   for(let x=0;x<c.width;x+=10){
     let y=c.height*0.55 +
       Math.sin(x*0.02 + time*(2+layer))*(5+layer*3);
     ctx.lineTo(x,y);
   }
   ctx.stroke();
 }

 ctx.fillStyle="#f4d9a5";
 ctx.fillRect(0,c.height*0.8,c.width,c.height);
}

// LOOP
function loop(){

 drawScene();

 if(started && !gameOver){

   p.x+=p.vx;
   p.y+=p.vy;

   p.x=Math.max(0,Math.min(c.width,p.x));
   p.y=Math.max(0,Math.min(c.height,p.y));

   p.angle = p.vy * 0.1;

   if(Math.random()<0.02){
     birds.push({
       x:c.width,
       y:Math.random()*c.height*0.6,
       vy:(Math.random()-0.5)*1.5
     });
   }

   if(Math.random()<0.015){
     hearts.push({x:c.width,y:Math.random()*c.height*0.6});
   }

   birds.forEach(b=>{
     b.x-=speed;
     b.y+=b.vy;

     ctx.fillStyle="black";
     ctx.fillRect(b.x,b.y,20,10);
     ctx.fillRect(b.x+5,b.y-5,10,5);

     if(Math.abs(p.x-b.x)<25 && Math.abs(p.y-b.y)<25){
       gameOver=true;
     }
   });

   hearts.forEach(h=>{
     h.x-=speed;

     ctx.fillStyle="red";
     ctx.beginPath();
     ctx.arc(h.x,h.y,6,0,Math.PI*2);
     ctx.fill();

     if(Math.abs(p.x-h.x)<20 && Math.abs(p.y-h.y)<20){
       score+=10;
       h.hit=true;

       for(let i=0;i<5;i++){
         particles.push({
           x:h.x,y:h.y,
           vx:Math.random()*4-2,
           vy:Math.random()*4-2,
           life:20
         });
       }
     }
   });

   particles.forEach(pt=>{
     pt.x+=pt.vx;
     pt.y+=pt.vy;
     pt.life--;
     ctx.fillStyle="pink";
     ctx.fillRect(pt.x,pt.y,2,2);
   });

   birds=birds.filter(b=>b.x>-50);
   hearts=hearts.filter(h=>!h.hit && h.x>-50);
   particles=particles.filter(p=>p.life>0);

   speed+=0.0003;
   score++;
 }

 ctx.save();
 ctx.translate(p.x,p.y);
 ctx.rotate(p.angle);
 ctx.font="36px sans-serif";
 ctx.fillText("❤️",-18,10);
 ctx.restore();

 ctx.beginPath();
 ctx.arc(joy.baseX,joy.baseY,40,0,Math.PI*2);
 ctx.strokeStyle="white";
 ctx.stroke();

 ctx.beginPath();
 ctx.arc(joy.baseX+joy.x,joy.baseY+joy.y,20,0,Math.PI*2);
 ctx.fillStyle="white";
 ctx.fill();

 if(gameOver){
   ctx.fillStyle="white";
   ctx.fillText("Game Over - "+score,20,40);
 }

 requestAnimationFrame(loop);
}

loop();

};
</script>

</body>
</html>
