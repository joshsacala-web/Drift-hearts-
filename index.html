<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Saxson 2 Ultra</title>

<style>
body{margin:0;background:#07070a;font-family:sans-serif;color:#fff;overflow:hidden}
canvas{display:block}

#ui{
 position:fixed;bottom:0;width:100%;
 display:flex;justify-content:space-between;
 padding:12px;
 background:linear-gradient(#000,#111);
 border-top:2px solid #caa64a;
}

button{
 background:linear-gradient(#ffd700,#caa64a);
 color:#000;
 font-weight:bold;
 border:none;
 padding:12px 24px;
 font-size:18px;
 border-radius:6px;
 box-shadow:0 0 10px rgba(255,215,0,0.5);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
<div>💰 $<span id="bal">100.00</span></div>
<div>🎁 <span id="fs">0</span></div>
<div>✖️ x<span id="mult">1</span></div>
<button onclick="spin()">SPIN</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

// SYMBOL SET (styled)
const symbols=["A","K","Q","J","W","S1","S2"];

function color(sym){
 return {
  A:"#6cf",
  K:"#fc6",
  Q:"#c6f",
  J:"#6f6",
  W:"#ff0",
  S1:"#f55",
  S2:"#5ff"
 }[sym];
}

// REELS
const reels=[
 ["A","K","Q","J","A","K","W","Q","J"],
 ["K","Q","A","J","S1","K","Q","W"],
 ["Q","A","K","J","W","Q","A"],
 ["A","K","Q","S2","J","W","A"],
 ["K","Q","A","J","W","K"]
];

// STATE
let grid=[];
let spinning=false;
let speed=[0,0,0,0,0];
let offset=[0,0,0,0,0];

let balance=100,bet=0.5;
let inBonus=false,fs=0,mult=1;
let sticky=[false,false,false,false,false];

// INIT
function rand(i){
 return Array.from({length:3},()=>reels[i][Math.floor(Math.random()*reels[i].length)]);
}
function init(){
 grid=[];
 for(let i=0;i<5;i++) grid.push(rand(i));
}
init();

// SPIN
function spin(){
 if(spinning) return;

 if(!inBonus){
  if(balance<bet) return;
  balance-=bet;
 } else fs--;

 spinning=true;

 for(let i=0;i<5;i++){
  speed[i]=25+i*4;
 }

 // anticipation
 if(grid[1].includes("S1")){
  speed[3]=8;
 }
}

// END
function endSpin(){

 let s1=grid[1].includes("S1");
 let s2=grid[3].includes("S2");

 if(!inBonus && s1 && s2){
  inBonus=true;
  fs=getFS();
  mult=1;
 }

 let win=calcWin();

 if(inBonus){
  applySticky();
  if(win>0){
   win*=mult;
   mult++;
  }
  if(fs<=0){
   inBonus=false;
   mult=1;
   sticky=[false,false,false,false,false];
  }
 }

 balance+=win;
 updateUI();
}

// FS
function getFS(){
 let r=Math.random();
 if(r<0.4) return 8;
 if(r<0.7) return 10;
 if(r<0.9) return 12;
 if(r<0.97) return 15;
 if(r<0.995) return 20;
 return 30;
}

// STICKY
function applySticky(){
 for(let i=0;i<5;i++){
  if(grid[i].includes("W")) sticky[i]=true;
  if(sticky[i]) grid[i]=["W","W","W"];
 }
}

// WIN
function calcWin(){
 let w=0;
 for(let r=0;r<3;r++){
  let f=grid[0][r];
  let c=1;
  for(let i=1;i<5;i++){
   let s=grid[i][r];
   if(s===f || s==="W") c++;
   else break;
  }
  if(c>=3) w+=c*2;
 }
 return w;
}

// UPDATE
function update(){

 if(spinning){
  for(let i=0;i<5;i++){
   offset[i]+=speed[i];
   speed[i]*=0.9;

   if(speed[i]<0.5){
    speed[i]=0;
    grid[i]=rand(i);
   }
  }

  if(speed.every(s=>s===0)){
   spinning=false;
   endSpin();
  }
 }
}

// DRAW
function draw(){

 ctx.fillStyle="#050507";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 // frame
 ctx.strokeStyle="#caa64a";
 ctx.lineWidth=6;
 ctx.strokeRect(80,80,500,300);

 for(let i=0;i<5;i++){
  for(let j=0;j<3;j++){

   let x=100+i*100;
   let y=100+j*100-(offset[i]%100);

   let sym=grid[i][j];

   // slot cell
   ctx.fillStyle="#111";
   ctx.fillRect(x,y,90,90);

   // glow
   ctx.shadowBlur=15;
   ctx.shadowColor=color(sym);

   // symbol
   ctx.fillStyle=color(sym);
   ctx.font="bold 28px sans-serif";
   ctx.fillText(sym,x+25,y+55);

   ctx.shadowBlur=0;
  }
 }
}

// UI
function updateUI(){
 bal.innerText=balance.toFixed(2);
 fs.innerText=fs;
 mult.innerText=mult;
}

// LOOP
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
