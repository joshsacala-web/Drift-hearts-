<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
html, body {
 margin:0;
 padding:0;
 overflow:hidden;
 touch-action:none;
 overscroll-behavior:none;
 background:#87ceeb;
}
canvas { display:block; }

#ui{
 position:fixed;
 top:10px;
 width:100%;
 text-align:center;
 color:white;
 font-family:sans-serif;
 text-shadow:0 0 6px black;
 font-size:16px;
}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

// HARD BLOCK gestures (this fixes zoom 100%)
["gesturestart","gesturechange","gestureend","dblclick"].forEach(e=>{
  document.addEventListener(e, ev => ev.preventDefault());
});

let playing = true;
let score = 0;
let highScore = localStorage.getItem("hs") || 0;
let startTime = Date.now();

// player
let p = { x:120, y:c.height/2, vy:0 };

// pipes
let pipes = [];
let lastSpawn = 0;

// INPUT (clean + consistent)
function flap(e){
 e.preventDefault();

 if(!playing){
   location.reload();
   return;
 }

 // reset velocity (no stacking = consistent feel)
 p.vy = -6.2;
}
document.addEventListener("touchstart", flap, {passive:false});
document.addEventListener("mousedown", flap);

// LOOP
function loop(){

 let now = Date.now();
 let time = (now - startTime)/1000;
 let level = Math.floor(time / 30);

 // smooth difficulty
 let speed = 2.0 + level * 0.25;
 let gap = 210 - level * 8;
 if(gap < 150) gap = 150;

 // SKY (cleaner)
 let sky = ctx.createLinearGradient(0,0,0,c.height);
 sky.addColorStop(0,"#5cc6ff");
 sky.addColorStop(1,"#eaf7ff");
 ctx.fillStyle = sky;
 ctx.fillRect(0,0,c.width,c.height);

 // SPAWN (time-based = FIXES spacing issue)
 if(now - lastSpawn > 1800 - level*80){
   let top = Math.random()*(c.height-300);

   pipes.push({
     x:c.width,
     top,
     bottom:top+gap,
     scored:false
   });

   lastSpawn = now;
 }

 // DRAW pipes (better look)
 pipes.forEach(pipe=>{
   pipe.x -= speed;

   let grad = ctx.createLinearGradient(pipe.x,0,pipe.x+60,0);
   grad.addColorStop(0,"#ff7a8c");
   grad.addColorStop(1,"#ff3b5c");

   ctx.fillStyle = grad;

   // top
   ctx.fillRect(pipe.x,0,60,pipe.top);

   // bottom
   ctx.fillRect(pipe.x,pipe.bottom,60,c.height);

   // soft shadow
   ctx.fillStyle="rgba(0,0,0,0.15)";
   ctx.fillRect(pipe.x+60,0,5,pipe.top);
   ctx.fillRect(pipe.x+60,pipe.bottom,5,c.height);

   // score
   if(!pipe.scored && pipe.x < p.x){
     score++;
     pipe.scored = true;
   }

   // collision
   if(
     p.x > pipe.x && p.x < pipe.x+60 &&
     (p.y < pipe.top || p.y > pipe.bottom)
   ){
     playing = false;
   }
 });

 pipes = pipes.filter(p=>p.x>-70);

 // PHYSICS (balanced)
 p.vy += 0.42;
 if(p.vy > 7) p.vy = 7;

 p.y += p.vy;

 if(p.y < 0) p.y = 0;
 if(p.y > c.height) playing = false;

 // PLAYER
 ctx.shadowBlur = 10;
 ctx.shadowColor = "red";
 ctx.font="40px sans-serif";
 ctx.fillText("❤️", p.x, p.y);
 ctx.shadowBlur = 0;

 // SAVE high score
 if(!playing && score > highScore){
   highScore = score;
   localStorage.setItem("hs", highScore);
 }

 // UI
 document.getElementById("ui").innerText =
   playing
   ? `Score: ${score} | High: ${highScore} | Level: ${level+1}`
   : `Game Over — ${score} (tap)`;

 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
