<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Heart</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: -apple-system, Arial, sans-serif;
    color: white;
}

/* 🌅 BACKGROUND */
.bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(to top, #020617, #0f172a 40%, #1e3a8a 70%, #f97316);
}

/* 🌊 OCEAN */
.ocean {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40%;
    background: linear-gradient(to top, rgba(0,100,200,0.6), transparent);
}

.ocean::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
    animation: wave 10s linear infinite;
}

@keyframes wave {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

/* APP */
#app {
    position: absolute;
    top: 35%;
    width: 100%;
    text-align: center;
}

/* HEART */
.heart {
    font-size: 100px;
    transition: transform 0.3s ease;
}

/* TEXT */
#label {
    margin-top: 20px;
    font-size: 32px;
    letter-spacing: 3px;
}

/* START SCREEN */
#startScreen {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

button {
    margin-top: 15px;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

#startBtn { background: #ef4444; color: white; }

</style>
</head>

<body>

<div class="bg"></div>
<div class="ocean"></div>
<div class="overlay"></div>

<div id="startScreen">
    <h1>Calm Your Heart</h1>
    <button id="startBtn" onclick="start()">Start</button>
</div>

<div id="app">
    <div class="heart" id="heart">❤️</div>
    <div id="label">READY</div>
</div>

<script>

let heart = document.getElementById("heart");
let label = document.getElementById("label");

let running = false;
let startTime;

/* 🔊 CALMER VOICE */
function speak(text) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.65;
    msg.pitch = 0.7;
    msg.volume = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
}

/* 🔔 END TONE */
function endTone() {
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.frequency.value = 432;
    gain.gain.value = 0.1;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime + 1.5);
}

function start() {
    document.getElementById("startScreen").style.display = "none";
    running = true;
    startTime = Date.now();
    intro();
}

async function intro() {
    speak("Follow the heart. Breathe slowly.");
    await sleep(2000);
    breatheLoop();
}

async function breatheLoop() {
    while (running) {

        let elapsed = (Date.now() - startTime) / 1000;

        if (elapsed >= 60) {
            endSession();
            break;
        }

        // INHALE
        label.innerText = "INHALE";
        speak("Inhale");
        heart.style.transform = "scale(1.5)";
        await sleep(4000);

        // HOLD
        label.innerText = "HOLD";
        await sleep(800);

        // EXHALE
        label.innerText = "EXHALE";
        speak("Exhale");
        heart.style.transform = "scale(1)";
        await sleep(6000);

        label.innerText = "";
        await sleep(500);
    }
}

function endSession() {
    running = false;

    label.innerText = "CALM";
    speak("Well done. You are calm.");
    endTone();

    let btn = document.createElement("button");
    btn.innerText = "Continue";
    btn.onclick = () => {
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    };

    document.getElementById("app").appendChild(btn);
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

</script>

</body>
</html>
